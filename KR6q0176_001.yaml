body:
  text: 宗鏡錄中略出大意夫若不入觀心法門會萬物為自己者則一理不立一事不成何以故理因心顯事假心成若無於心決定無有一法而可建立故云從無住本立一切法以萬法本無自體但從識變心若不起諸境皆空心生法生心滅法滅此之謂矣無量光院若不觀心何以得道故云心即是道道則是心又云道非心外行在言前即心為道者可謂尋流得源矣若不觀心何以成佛以即心是佛即佛是心心外無別佛佛外無別心又云諸佛與一切眾生唯是一心更無別法覺心即是唯此一心即是佛見此心即是見佛是以如來成正覺時於其身中普見一切眾生成正覺乃至普見一切眾生入涅槃皆同一性所謂無性以無性故隨淨緣而成佛隨染緣而墮凡然雖處凡身覺性不動如真金像弊服所覆猶無價寶垢衣所纏若貧女而懷聖胎同青蓮而未出水時節有異心性無差如瓶貯醍醐隨諸器而不等猶水分江海遂流處而得名此是上上根人一念法界直聞直受頓入頓修若中下之根見多訛謬空領唯心之旨微細義理不通或執心為空或執心為有或知心名而不識心體或了心理而不具心行真妄莫辨本末焉明所以五性不同三乘有別宗分南北見其親疏況末代淺根寧無疏漏耶如圭峰揀云如北宗明眾生本有覺性如鏡有明性妄念淨則心性覺悟昏塵盡則鏡體光明評曰此但是染淨緣起之相反流背習之門而不覺妄念本無心性本淨悟既未徹修豈稱真其洪州云起心動念彈指動目所作所為皆是佛性全體之用更無別用如世人一念命終全身都未變壞即便口不能言眼不能見耳不能聞足不能行手不能作故知能言語動作者必是佛性評曰北宗則分別動作一切是妄洪州則分別動作一切是真若存他則失己爭肯會同牛頭云諸法如夢本來無事心境本寂非今始悟理宜喪己忘情方絕苦因妄果評曰此以忘情為修洪州以念念全真為悟任心為修此以本無事為悟忘情為修如上三家見解異者初一皆妄次一皆真後一皆無若就行說者初伏心滅妄次信任情性後休心不起今荷澤宗者是釋迦降世達磨西來之意也將前望此此乃迴異於前將此攝前前則全同於此謂諸法如夢諸聖同說故妄念本寂塵境本空空寂之心靈知不昧即此空寂之知是前達磨所傳清淨心也任迷任悟心本自知不藉緣生不因境起迷時煩惱知非煩惱悟時神變知非神變然知之一字眾妙之門此知是一切含生心體心是名知是體如水是名濕是體此知非能所分別之知亦非智照證悟之知乃是真性自然靈知任運了然亦非作意隨緣不變不變隨緣故云空寂知空寂即是無相以神解之性雖無形相而靈知不昧故云寂知亦云寂照亦云無相之知亦云無知之知如肇論云放光云般若無所有相無生滅相道行云般若無所知無所見此辨智照之用而曰無相無知者何耶果有無相之知不知之照明矣何者夫有所知則有所不知以聖心無知故無所不知不知之知乃曰一切知故經云聖心無知無所不知信矣空寂即是無相即是無知論云無所不知又云乃曰一切知者此知即是真知同空寂之知亦云無念之知若有念而知凡夫境界若無念無知二乘境界若無念而知諸佛境界空寂即是無念亦云無住之知有所住如人入闇即無所見無所住如日月光明照見種種色特以喻顯如一摩尼珠一靈心也唯圓明淨空寂知也都無一切差別色相此知本無一切分別亦無一切善惡也以體明故對外物時能現一切差別相以體知故對諸緣時能分別一切是非好惡乃至經營造作世間種種事數此是隨緣義也色相自有差別明珠不曾變易愚智善惡自有差別憂喜愛憎自有起滅能知之心不曾間斷此是不變易義也然珠所現色雖有百千般今且取與明珠相違之黑色以況靈明知見與黑闇無明雖相違而是一體法喻已具謂如珠現黑色時徹體全黑都不見明靈知之心在凡夫時全是愚癡貪愛都不覺知如無如來知見大圓鏡智故經身心等相皆是無明也若癡孩子或村墅云見之直是黑珠迷人但見定是凡夫上都喻六道眾生已下諸宗教之人有人語云此是明珠灼然不信卻嗔前人謂言欺誑任說種種道理終不聽覽或向道汝今了了能知現是佛心直不照察但言某乙鈍根實不能入此是大小乘法相及人天教中著根之人意所見如此也縱有肯信所言說是明珠者緣覩其黑亦謂被黑色纏裹覆障擬待磨拭揩洗方去黑闇或普清潔也得明相出現始名親見明珠北宗見解如此也復有一類人指示云即此黑闇便是明珠明珠之體永不可見欲得識者即黑便是乃至即種種青黃皆是致令愚者的信此言專記黑相或認種種相以為明珠或於異時見黑槵子未吹青珠碧珠乃至赤琥珀白石瑛等珠皆云是摩尼珠或於異時見摩尼珠都不對色時但有明淨之相卻不認之以不見有諸色可識認故疑恐局一明相故洪州見解如此也愚者彼宗後覺也異時乃至黑槵子等者心涉世間分別塵境時見貪愛嗔慢之念也琥珀白石瑛者如慈善謙敬之念也不對色時者無所念也但有明淨者了了自知無念也疑局者云唯認知是偏局也復有一類人聞此種種色皆是虛妄徹體全空即計此一顆珠都是其空便云都不執定方是達人認有一法便是未了不悟色相皆空之處乃是不空明瑩之珠牛頭見解如此也聞說空者諸部般若說空經也計此一顆珠等者計本覺性亦空無所有認有等者聞說諸法空寂之處了了能知是本覺真心體不空不空者涅槃經云如瓶空者謂瓶中無物名為瓶空非謂無瓶即明真心之中無分別貪嗔等念名為心空非為無心者但謂遣卻心中煩惱也故知牛頭但遣其非未顯其是從此已下喻澤意也何如直云唯瑩淨圓明方是珠體唯空寂知也若但說空寂而不顯知即何異虛空亦如圓顆瑩之瓷團雖淨無明性何名摩尼何能現顯洪州牛頭但說無一切不顯靈知亦如此也其色乃至一切青黃色等悉是虛妄善惡分別舉動為如洪州所說起心動念等也用心動念皆妄故金剛經云凡所有相皆是虛妄當知彼宗認虛妄為真性也正見黑時黑元不黑但是其明青元不青但是其明乃至赤白黃等一一但見瑩淨圓明即於珠不惑一切皆空唯心不變迷時亦知知元不迷念起亦知知元無念乃至哀樂喜怒愛惡一一皆知知元空寂空寂無知即於心性了然不惑此上皆迴異諸宗也故初標云將前望此此即迴異於前也但於珠不惑則黑既無黑黑即是珠諸色皆爾即是有無自在明黑融通復何礙哉此同彼二宗黑即無黑牛頭洪州俱云一切皆無也黑即是珠已下同洪州云一切皆是佛性凡聖善惡皆無所礙故初標云將此攝前即全同於此已下喻意再將荷澤本宗揀三宗也若不認得明珠是能現之體永無變易又明荷澤認得也但云黑等是珠洪州或擬離黑覓珠北宗或言明黑都無者牛頭皆是未見珠也都法問據大乘經及古今諸宗禪門乃至荷澤所說理性皆同云無善無惡無果無因無凡無聖無是無非無住無為不可證不可說今何獨標荷澤為正答荷澤於空無相處指示知見了了常知不昧心性是故諸教只說此知無住無生等令人認得便覺自心經生越世永無間斷乃至成佛也荷澤又束無為無住乃至不可說等種種之言但云空寂知一切攝盡空卻諸相猶是遮遣之言唯寂是實性不變動義不同空無也知是當體表顯義不同分別也唯此方為真心本體故始自發心乃至成佛唯寂唯知不變不斷但隨地位名義稍殊謂約了悟時名為理智理即是寂智即知也約發心修時名為止觀止息麤緣契於寂也觀照性相冥於知也約任運成行名定惠因止緣而心定定者寂然不變因觀照而發惠惠者知無分別矣約煩惱都盡功行圓滿成佛之時名為菩提涅槃菩提梵語此云覺即是知也涅槃梵語此云寂滅即是寂也當知始自發心乃至畢竟唯寂唯知若知二宗但言空寂無為等義而闕菩提等義問洪州亦云靈覺及鑒照等何異於知答今指示即愚智善惡乃至禽畜等心性皆自然了了常知異於木石其覺智等言即不通一切為迷者不覺愚者無智心無記時即不名鑒等豈同心體自然常知故花嚴疏主答順宗所問心要云無住心體靈知不昧又云任運寂知又云雙照寂知花嚴經亦揀知與智別況洪州雖云靈覺但是標眾生有之如云皆有佛性之言非的指示指示則但能語言等若細詰之即云一切假名無有定法且統論佛教有遣顯二門推其實義有真空妙有究其本心具體具用今洪州牛頭以拂跡為至極但得遣教之意真空之義唯成其體失於顯教之意妙有之義闕其用也問洪州以能語言動作等顯於心性即當顯教即是其用何所闕耶答真心本體有二種用一者自性本用二隨緣應用猶如銅鏡銅之質是自性體銅之明是自性用明所現影是隨緣用影即對緣方現現有千差明即光明明唯一味以喻心常寂是自性體心常知是自性用此能語言能分別動作等是隨緣用今洪州指示能語言動作等但是隨緣用也闕自性用也又顯教有比量顯現量顯洪州云心不可指示但以能言語等驗之知有佛性是比量顯也荷澤直云心體能知知即是心不約知以顯心是現量也如諸祖所說心之一字言不頓彰義分別前後若約一言之內皆攝無邊以無漏性德真如萬行一心本具故所以云提綱則網正舉領則衣齊自是聞者乖宗多隨語轉聞有執有聞空滯空見解偏枯致茲差誤迷佛方便執指循文都不知證下之旨若頓機一覽豁悟無疑凡聞一言便知說心更無異法豈存四句寧墮百非乃至聞說有為則知舉有為心宗便攝法界聞說無為亦是舉無為心端亦具法界或說真諦俗諦凡掛言詮盡圓照之一心理事具足此皆多是後學誤領錯傳故非宗師之咎矣且如洪州所宗直論真性不辨邪正異同此則唯逗上上之機一聞千悟頓圓大覺不涉漸修種現俱消正習咸斷如經云見若諦習亦除於理則絲毫不差約行則無復上慢如圭峰所揀頗令精微俯為羣機恐成叼濫洞明體用分析異同於後學進修甚為利益理事無滯祖教並行妙旨豁然可為龜鏡若不觀心何以成凡聖以凡聖但名於一心實際中無毫釐凡聖可得故云心淨故眾生淨心垢故眾生垢心能天堂心能地獄如有頌云一切眾生界皆在三世中三世諸眾生悉住五薀中諸薀業為本諸業心為本心法猶如幻世間亦如是若不觀心何以出家故云觀一念心淨若虛空不為二邊桎梏所礙平等大惠無住無著即名出家又有偈言無瞋是持戒心淨是出家我性與汝合一切法無差若不觀心何成正報以因心造業成身故古頌云天龍阿修羅地獄鬼羅剎心常為導主如王行三界心將詣天上復行於人中心將至餓道心輪轉世間若不觀心何成依報以只於自心性相分身土二名以自心相義名身以自心性義名土故知主伴依正不離五薀五薀性空即是一心平等又云見法從緣則知國由心現由心現故有而即空空為法源萬法由生見法性源是真智惠又有頌言心住於世間世間住於心於此不妄起二非二分別既全是心誰言一二但有言說皆是識心計度分別如有頌言諸法寂滅非寂滅遠離此二分別心知諸分別是世見入於正位分別盡若不觀心何以窮源故云窮源莫二執跡多端若據本以討源則千途無異轍若三江之浩渺並出於岷山也又云此觀心法為大根人善識法要不由次第懸照諸法之源所謂眾生心也一切諸法由心而起若能反觀心性不得心源即知萬法皆無根本如是則可比知我心為諸法本聖教正理證若恒沙如有頌言天地風空虛波池方大海皆真內所作外義俱非有又云聖教及正理各別有功能而生於信惠無一不成故若無此一心觀門無由信惠離唯識理無成佛期如千人排門不如一人拔開餘教如排門見有善惡之境妄修功行種種對治如剝色蕉謂有真實猶食蒗蕩妄見針火都不知凡聖之境從本以來皆是意言分別此意言有二一似名一似義名義攝一切法皆盡此名義但是意言分別所作離此無別餘法故知自他內外事相唯是一心轉變若佛唯識但有真心故云唯有真如及真如智獨存說名法身可謂理事之宗凡聖之地矣如是信入況一人拔關無不應時開悟若不觀心何以得體以凡聖諸法皆自心為體故云知一切法即心自性成就惠身不由他悟以此心體橫遍豎周從體起用用無差別如布青陽令處處春色皆同似折白檀香片片如本香無異若不觀心何以達本以一切諸法皆以第八阿賴耶識心為本則本立而道生根成而果熟如無綱目不立無皮毛靡附又此根本識心遍在諸法如沫在浪若油遍麻似鹹處鹽猶青住色光潛日月香薀沈檀泥在於瓶無常遍境心無間斷亦復如是故有頌云如地無分別庶物依以生藏識亦復然眾境之依處如人以己手還自捫其身亦如象以鼻取水自霑灑復似諸嬰孩以口含其指如是識分別現境還自緣是心之境界普遍於三有久修觀行者而能善通達內外諸世間一切唯心現若不觀心何以成觀故云一心三觀三觀一心理事圓融開合自在若心空十法界空心假十法界假心中十法界中唯心識觀云所謂於一切時一切處隨身口意所有作業悉當觀察知唯是心乃至一切境界若心住念皆當察知勿令使心無記攀緣不自覺知於念念間悉應觀察隨心所有緣念當使心隨逐彼念令心自知知己內心自生想念非一切境界有念有分別也所謂內心自生長短好惡是非得失衰利有無等見無量諸想而一切境界未曾有想起於分別當知一切境界自無分別想故即自非長非短非好非惡乃至非有非無離一切相如是觀察一切諸法唯心想生若使離心則無一法一相而能自見有差別也或花嚴四觀普賢十觀乃至絕觀皆不離心而得成就若不觀心何以辨名以一切法本自無名無名而有名者皆從心起心即名也其能如是解者即於正觀心中見一切諸佛菩薩乃至無邊教義無不知也若不觀心何以明教以因心立教因教明心一切言說義宗教理行果悉皆是心無不收盡以一切言語由覺觀心一切諸行由於思心一切義理由惠心故即觀一念因緣所生之心生滅即起藏教故云佛告諸比丘謂一切者只是一法何等為法心是一法離心無一切法也觀心因緣所生之法空即起通教觀心因緣所生即假名具足一切恒沙佛法依無明阿賴耶識分別無量聖諦即起別教觀心因緣所生具足一切十法界法無所積聚不縱不橫不思議中道二諦之理即起圓教故云一色一香無非中道乃至五味半滿無盡真詮悉從一心而演從真如出依法界流故云破一微塵讀大千經卷若不觀心何以成用以凡有施為皆是一心真如之妙用故云繁興大用起必全真如截金杖寸寸是寶猶體諸法一一皆心若不觀心何以提宗以萬法一心為宗宗者尊也故云天上天下唯我獨尊則一法為宗萬象皆爾如一葉落天下秋一塵起大地收又如一花開天下春一事實萬法真所以舉一例諸無煩廣覽故云說教本窮無相理廣讀元來不識心識取心了取境識心了境禪河靜若能了境便識心萬法都如達婆影又如頌言如飯一粒熟餘粒即可知諸法亦復然知一即知彼譬如攢酪者嘗之以指端如是諸法性可以觀察所以蔟義天星象指在一塵卷教海之波瀾歸乎一滴若不觀心何以立行以行從心成理能導行故有頌云若不證真如焉能了諸行猶如幻事等似有而非真如解脫長者告善財言我若欲見安樂世界阿彌陀佛隨意即見乃至所見十方諸佛皆由自心善男子當知菩薩修諸佛法淨諸佛剎積習妙行調伏眾生發大誓願入一切智自在遊戲不可思議解脫之門得佛菩提現大神通遍住十方一切法界以微細智普入諸劫如是一切悉由自心是故善男子應以善心扶助自心應以法水潤澤自心應於境界淨治自心應以精進堅固自心應以忍辱坦蕩自心應以智證潔白自心應以智慧明利自心應以佛自在開發自心應以佛平等擴大自心佛十力照察自心是以心該萬法謂非但一念觀佛由於自心菩薩萬行佛果體用亦不離心乃至佛之三身十波羅密菩薩利他等行並依自法融轉而行即眾生心中有真如體大今日修行引出法身由心中有真如相大今日修行引出報身由心中有真如用大今日修行引出化身由心中有真如法性自在無慳貪今日修學順法性無慳引出檀波羅密等當知三祉修行道不曾心外得一法行一法何以故但是自心引出自淨行性而起修之故知摩尼沈泥不能雨寶古鏡積垢焉能鑒人雖心性圓明本來具足若不眾善顯發萬行磨治方便引出成其妙用則永翳客塵長淪識海成妄生死障淨菩提若不觀心何以入位以心心圓融位位即佛故云一地具足一切諸地功德以一心圓融不礙隨事行布如一圓珠有八萬四千孔隨入一孔全收珠體故云八萬四千法門門門解脫何以俱成解脫但唯自心無別法繫縛故如魚在水若鳥翔空出水則鱗枯離空則翼墜人不識心亦如是若不觀心何以知因果以大乘因者即是實相大乘果者亦是實相一切無有不由心者萬象森羅皆是善惡報應業之影像自心所招增上等流之果故云若入此觀法則智與心相應是以因由心學果是心成境由心現解由心起分位神通是心力用造作是心現起分別是心決擇所得是心乃至尋求知識造諸佛土皆是心故云三界無別法但是一心作是以心垢則娑婆現相心淨則花藏含空迴轉而恒起識輪交羅而匪離心納故海幢不起寂定應作十方佛事之門善財不出道場遍歷一百十城之法乃至號阿閦佛者此云不動以一心於諸境界中不動故處凡身而不滅居聖體而不增登一相而不昇淪五道而不墜故云不動稱阿彌佛者此云無量壽以一心真如妙理性無盡故稱無量達大道心虛通無礙名為菩薩了心所生因緣性離即名緣覺從心所聞以佛道聲令一切聞即號聲聞十心數法即十大弟子文殊即妙惠根本之心普賢即圓行無盡之心觀音即大悲之心勢至即大智之心但有真俗二諦世出世間一切凡聖名字皆是心作離心更無一法如離海無水離空無雲則一切善惡境界皆是心光一切聖妙受用皆是心果故云其為也形其寂也冥本淨非瑩法爾天成光超日月德越太清萬物無作一切無名轉變天地自在縱橫恒沙而用混沌而成誰聞不喜誰聞不驚如何以無價之寶隱於蔭入之坑方知自心殊勝如是仰為千聖讚之靡窮遍覽羣經釋之莫盡若契同心性何德不收以一切諸法隨所依住皆於一心頓圓滿故故云若有人信汝所說則為見我亦見於汝及比丘僧并諸菩薩何者聞經心信無疑覺此信心明淨即是見釋迦佛若心所中惠數分明是見身子諸餘心數分明是見諸比丘僧慈悲心淨是見諸菩薩即心便是亦無所見是以善財童子頓了無能所處便成佛故又如頌云所取不可取所見不可見所聞不可聞一心不思議若不觀心何以照明佛性夫佛性者即如來藏是真識心此心中具有一切恒沙佛法如妄心中具有恒沙染法是心與法同一體性故名如來藏即一切眾生有如來藏能為佛因名為佛性如睡心中有覺悟性如黃石中有金性白石中有銀性如是一切世間法中皆有涅槃性此性即是眾生自覺故名為我我即佛性夫佛性者義有多門若約智則名本覺性智性自了故以平等性智了本性故或名大圓鏡智普照無遺故若約定是說或名不思議定情智絕待故亦名真如三昧萬行根本故亦名一行三昧一念法界故亦名金剛三昧常不傾動故亦名法性三昧恒無變易故諸佛智光明海無量觀行皆從此生若不體此理非佛智故以此佛智證斯本理理則不待照而自了智則必資理而自了智則必資理而成故智理無興廢寂照靈知弘之在人覺有先後人有照分功由理發失理則失照要見此理方成佛耳此理即是一心物該萬有頓悟頓修更無漸次為未了不入之者於一心法分出多門義演恒沙乃至無盡如有頌言小智樂小法不自信作佛是故以方便分別說諸果雖然未了性且無鍔時機契會自然開發如貧女室中金藏雖未掘而覺寶匪移若力士額上明珠任鬥沒而光明常在猶雪山筩中藥味暫流出而正體恒存如大地底下金剛縱穿斷而堅慳不壞又夫佛性體有三因一應得因二加行因三圓滿因又應得因中具有三性一住自性性二引出性三得果性以住自性之理在凡而即具以引出性之事成果而不虛以應得之文處染而何失以至得之道證聖而無疑故云眾生身中有金剛佛性猶如日輪佛者是覺人有靈知之覺今第一義空與之為性故名佛性非情無覺但持自體得稱為法今真性以之為性故名法性故云假說能所而實無差同一性故外典亦云天地萬物同稟陰陽之元氣也既稱同稟豈有別緣故知有情無情有性無性皆同一道所為唯心或號真如或稱靈智或云妙性或說真心或號真知者不同虛空性自神解此是本體常知不假作意所以云此心有真實了知義稱靈知者此是靈覺之性故云此心有大智慧光明義云妙性者是不假義無變異義故云不變隨緣名之為心隨緣不變名之為性說真心者即是真實自性清淨心故云此心有遍照法界義是以本師最後究竟垂示唯說一切眾生皆有佛性如應盡還源品云爾時世尊如是逆順入諸禪已普告大眾我以甚深般若遍觀三界一切六道諸山大海大地含生如是三界根本性離畢竟寂滅同虛空相無名無識永斷諸有本來平等無高下相無見無聞無覺無知不可繫縛不可解脫無眾生無壽命不生不起不盡不滅非世間非非世間涅槃生死皆不可得二際平等等諸法故閒居靜住無所施為究竟安置必不可得從無住法法性施為斷一切相一無所有法相如是其知是者名出世人是事不知名生死始又復告大眾我以摩訶般若遍觀三界有情無情一切人法悉皆究竟無繫縛者無解脫者無主無依不可攝持不出三界不入諸有本來清淨無垢無煩性虛空等不可等非不平等盡諸動念思想心息如是法相名大涅槃真見此法名為解脫凡夫不知名曰無明又復告大眾我以佛眼遍觀三界一切諸法無明本際性本解脫於十方求了不能得根本無故所因枝葉悉皆解脫無明解脫故乃至老死皆得解脫以是因緣我今安住常寂滅光名大涅槃又云一切障礙即究竟覺得念失念無非解脫成法破法皆名涅槃智惠愚痴通為般若菩薩外道所成就法同是菩提無明真如無異境界諸戒定惠及婬怒痴俱是梵行眾生國土同一法性地獄天宮皆為淨土有性無性齊成佛道一切煩惱畢竟解脫法界海惠照了諸相猶如虛空此名如來隨猶覺性善男子但願諸菩薩及末世眾生居一切時不起妄念於諸妄心不息滅住妄想境不加了知於無了知不辨真實彼諸眾生聞是法門信解受持不生驚畏是即名為隨順猶覺性是知了心即境達境唯心則處處無生塵塵隨覺性矣若不觀心何了緣起以無心外法能與心為緣但是自心生還與心為相乃至四緣十二因緣六因五果等一切差別義海百法明門悉是心成更無果法如云一切法門無盡海同會一法道場中若水疊千波不離溼以金分萬器皆是一金若不觀心何辨性相菩薩觀一切法皆以心為自性如是而住相有二種一影像相山河大地皆是心之影像二所執相諸相無體隨執而生相又二種一如外顯現二如內顯現如外是相如內是思維內即是心體外即是心用任展恒沙用周法界皆不離於心也性以處內相以表外內外雖分一心不動則心非內外內外是心若不觀心何窮理事以性空之理相虛之事互成互奪隱顯同時皆是一心開合之旨合唯一性開作萬像緣性無妨體用自在以一心真如之法法爾隨緣隨緣之法法爾歸性若不觀心何以成信以菩薩十信之初創發心時即觀本識自性緣起因果之體得成正信故云信心不二不二信心言語道斷非去來今是知諸法所生唯心所現即是顯識第八本心如云一切三界但唯有識者一是顯識二分別識顯識者即是本識轉作五塵四大等分別識即是意識於顯識中分別作人天長短大小男女一切萬物等乃至譬如依鏡色影色得起顯如是緣顯識分別識得起顯識如鏡分別識如鏡中像像依鏡現如意識緣本識起又云由此轉識能迴轉造作無量諸法或轉作根或轉作塵或轉作我或轉作識如此種種不同唯識所作如此造作迴轉也或於自於他互相隨逐者於自則轉為五陰或為色陰乃至識陰於他則轉為怨親中人種種不同望自五陰故稱為他如是自他互相轉作前後不同故云互相隨逐也種種所作並皆是識無別境界起種種分別等者一一識中皆具能所能分別即是識所分別即是境能即依他性所即分別性故云起種種分別及所分別也由如此義離識之外更無別境但唯有識是知諸器世間山河大地身根種子皆是第八阿賴耶識之相分於中分別高下長短好醜精粗悉是意識計度故知無有一法非心所標可謂現證法門能杜羣疑矣若不觀心何能稱悟以心包法界知一即一切故即之於心了之無際矣以昔迷時皆是遍計分別所執之性邪思妄見情有理無但執似生無毫釐實空中垂髮火上旋輪燄水乾城浮雲奔電乃至機中見鬼繩上生蛇諸境有無亦復如是如有頌言內外一切物所見唯自心有情心二性能取及所取心體有二門即心見眾物凡夫性迷惑於自不能了故知三界唯心萬法唯識識相識性皆不離心心所心王但是識是以心識二名本唯一體若性若相若能若所若內若外若自若他本末融通悉皆是識如墜地獄惡業熟時銅狗鐵山共相逼害業謝即空如油盡燈滅或似處夢見善惡之事雖無實境而有作用或見毒蛇雖不被螫然有疑毒能令悶絕流行心迷又如求梵天咒術夢中親聞天授天實不來以天為增上緣自心感見復曾聞乎夫求子息夢見有人共為交集便得其子又如有人思他國婬女彼實不來夢中從事或於夢中被人趨逐奔走驚嚇或得寶拜官喜慶交集雖無實事欣感宛然俱唯是心與覺無異只如二乘但信夢中唯識不信覺時唯心且如外見佛形皆是轉識所現如釋迦文佛化五百力士之時舉石空界吹散為塵後還合成復擎掌中令彼力士伏我慢心故佛有言我實不舉其石安置虛空亦不吹散皆是我積劫熏修慈善根力令彼自心見如是事可現證斯旨一切例然又如金地酪酥河肉山魚米皆不離菩薩能變之心更無外境故云諸佛菩薩變地為金者以妙觀察智繫大圓鏡智及異熟識令地種不起金種生現以此為增上能令眾生地滅金生名之為變非為便轉地成金又如福德之人捉石為金業貪之人遇金為石金非石而石現石非金而金生轉變皆心金石無體又似神通之者地作水相水作地形悉隨意成無有虛妄故云一切物中皆有可轉之理如僧護見身為寂瓶等當知色法皆隨感現色無定體隨心所變此理元是如來藏中不思議法隨心取著成外成內汝等所行是菩薩道平等法界方寸無虧則一切無礙人一道出生死十方薄伽梵一路涅槃門本自一心隨機見異如不識驪珠認為魚目魚目空有其名珠體宛然不易然此唯心法是最上乘四緣四分道理而成三量三宗詮棟而立故非耶謬大旨皎然眾聖羣賢無邊誓願之同稟千經萬論恒沙正義之俱詮若不觀心何以成頓以心如寶印文字頓現更無前後際故約斷障說如斬一婁絲萬條頓斷若修德說如染一婁絲萬修頓色故云一念與性相應八萬波羅蜜行一時齊用如有頌言如是知心識明解一切法一切知見人速成等正覺若不觀心何以破疑辨惑故云求大乘者所疑有二夫大乘法體為一為多如其是一即無異法無異法故無諸眾生菩薩為誰發弘誓願若是世多法即非一體非一體故物我各別何得起同體大悲由是疑惑不能發心今為譴此二疑立一心法開真如生滅體用二種門立一心法者遣彼物疑明大乘法唯有一心一心之外更無別法但有無明迷自一心起諸波浪流轉六道雖起六道之浪不出一心之海良由一心動作六道故得發弘誓之願六道不出一心故能起同體大悲如是依於一心能遣二疑得發大心具足佛道此說一心破出世菩薩疑惑也破世間凡夫疑惑者只謂一切眾生不了自心為境惑亂於不見處見向不聞處聞如餓鬼同見膿河翳眼妄觀蠅髮醉人看轉日熱病現珠形定中覩香花夢裏乘船筏罪人怖銅狗病士飲盃蛇斯皆是自心識變所作不能明了妄起愛憎如西施愛江嫫母嫌鏡豈知妍醜在我何關物乎又如云似一美色婬人見之以為淨妙心生染著不淨觀人觀之種種惡露無一淨處等婦見之妒瞋憎惡目不欲見以為不淨婬人觀之為樂妒人觀之為苦淨行之人觀之得道無預之人觀之無所適莫如見土木若此美色實淨四種人觀皆應見淨若實不淨四種人觀皆應不淨以是故知好醜在心外無定也又如凡夫食是轉王毒人間淨是諸天穢如共食寶器任福而飯色不同似一無為隨證而三乘有別故知境本非善但以順己之情便名為善境本非惡但以違己之情便名為惡是知實無外境唯想變情生以此證知斯門不謬是諸佛最上之妙理第一之真詮猶如地發生萬物猶如海容受百川猶如鏡一道照臨猶如秤審量一切故有頌言此即是佛最勝之教理審量一切法如秤如明鏡照耀如明燈亦如試金石正道之標相遠離於斷滅可斷纖疑同正斯理如未入者應須靜慮虛襟澄神寂照如同眼見豈言說之能及乎若動念起思返失真鑒故云如人動目天地傾搖故不能如實知也但如密室之燈自然朗耀此之心法唯證乃知神妙無方至理玄邈三際求而內得二諦推而莫知無像無名不可以測其深廣無依無住不可察其指蹤細入無間之中不可言其小大包乾象之外不可以語其深至道虛玄孰能合有幽靈不墜孰能合無邊分法界而非多性合真空而非一體凝一道而非靜用周萬物而匪勞如如意珠天上勝寶狀如芥栗有大功能淨明五欲七寶琳瑯非內畜非外入不謀前後不擇多少不作麤妙稱意豐儉降雨滾滾不添不盡利益無窮蓋是色法尚是如此豈況心神妙寧不具一切法耶此第一義諦觀心法門非淺智承當劣根信入鷰雀焉攀鴻鵠之志井之蛙寧探滄海之淵如金翅鳥飛翼奚及若毗沙門寶貧室難儔比師子哮乳時貍弗能作似香象所肩擔驢不能勝須遇大機一聞千悟同驛馬見鞭影速入正途如日出照高山頓明心地如有頌云便是猶倍句動目即差違若問曹谿旨不更待揚眉若不觀心何以出生死是以凡夫貪著無常計常念念輪迴新新生滅雖年百歲猶若剎那如東逝之長波似西垂之殘照擊石之星火驟隙之迅駒風裏之微燈草頭之懸露歸崖之朽樹爍目之電光若不遇斯觀門則萬劫虛浪生死是以生死無際如旋火輪一息一眴之中有四百生死煙迴電轉命若懸絲如羊就屠似肉趣市當祿命盡處風火散時勢不可臨威不可遏如師子正飢困毒蛇吸大風惡鬼振瞋心渴馬護惜水死王奮力甚畏於彼若欲了絕不無其門但先斷業繩次開心訣如云心外有法生死輪迴無心外法生死永棄是知了心實相眾患俱銷如伐樹除根生死之苦永絕猶灸病得穴煩惱之流病不生又若毗藍之風卷羣疑而淨盡猶劫燒之火蕩異執而無餘若以漸教漸修執事戒定不入斯門但除枝葉故云身被戒鎧心無惠劍者則不能懷結使之元首若不觀心妙惠成就終不能斷無明根本如日光現而絕暗冥業跡盡而無惡境是以若不在現量焉知法空空惠若成當處解脫則異生不墮生死海迷處全空諸佛不證真如門悟時無得若不觀心何以證涅槃以諸行皆以大涅槃心為本故云安置諸子於祕密藏中我亦自入其中又云此大般涅槃是諸佛放捨身命之處則自他始終究竟指歸之處千聖同稟百民交歸方知凡亦是心聖亦是心如清亦是水濁亦是水以所習處下不能自弘則溺塵勞耳若以心託事則狹劣為相所局不能自在故若以事從心則廣大以心無住無依則能放曠故大凡世人多外熏其事而內不曉其心是以所作所為俱非究竟所以附處卑故耳如檮縛牛之虻飛極百步若附鸞尾則一翥萬里非其翼工所託迅也亦牆頭之草角裏之聲皆能致其高遠者所託之勝也如入此觀門一一附於自心則毛吞巨浸塵納十方豈非深廣乎故如來出世為此一心大事因緣開示悟入一切眾生心即是佛心契同無二如藏中無寶徒勞掘鑿只有不寶不廢人工但發信心必當見性故云我為汝保任此事終不虛也纔入斯門一際平等如水未入海則不鹹薪未入火則不燒境未歸心則不等若以此觀之萬事皆同一照若不信者焉識此心其猶日月麗天盲者不覩雷霆震地聾者不聞妙契即隣不在身近如福人出世則琳瑯現矣薄福者出荊棘生焉皆由自心有現不現如月上女偈答舍利子云我雖內室中尊如目前現仁稱阿羅漢常隨而不見故須菩提不出石室親覩法身阿難為佛侍者不見佛面若不觀心何脫境縛以不知自識變起而復自緣如畫師畫出殊形飜生愛著以意識筆描三界圖高下纔分愛憎隨起又如春蚕作繭秋蛾撲燈惡見自纏無明自爇此觀心法可以現知如夜夢唯心覺亦如是且夢中見者是夢中意識現在見者是明了意識過未之境是獨散意識定中見者是定中意識是以若夢若覺若散若定皆不出四種意識且如現見青白物時於現量中得法自性不帶名言無籌度心是圓成語則不執為外色皆是眼識見分與同時明了意識以比量計度分別為青便成外解以意辨為色言說為青故云皆是意言分別如眼識率爾任運見時未分皂白剎那流入意地方執成境以意緣時眼識以過世人多執我眼現見全無道理見以若不歸己見性明宗於外別求從他妄學者如鑽水覓火壓砂出油此非正因徒勞功力若能尅己辯事諦了自心者如從木出火於麻出油不壞正因易得成就不隔一念功力立成是以堅信不移法空之虗聲自息明誠可驗靈潤之野𦦨俄停豈假傍通心魔頓絕匪憑他術識火俄銷除不肖人莫窮斯旨所以云依智不依識者謂識現行隨塵分別眼色耳聲躭迷不覺大聖示教境是自心下愚氷執塵為識外今人口誦其空心未亡有騰空不起入火逾難俱是心相封迷故爾後得通達隨心轉用豈不鳥之遊空自當如布之火浣不足恠也但羣生識性不同致令大聖隨情別說然據至道但是自心故云三界上下法義唯心此就世界依報以明心又云如如與真際涅槃及法界種種意生身我說為心量此據出世法體以明心終窮至實畢到斯源隨流感果還宗了義又以一切境界唯心妄動若心不起一切境界相滅唯一真心遍一切處又依唯識境本無體境既不生心亦隨滅以心是所依境是能依所依既滅能依不起則疑銷能所藤虵於是併空見息對治形名以之雙寂若不觀心何息分別以一切分別皆分別自心心不見心無相可得如有頌言法從分別生還從分別滅滅是諸分別是法非生滅生滅唯心法無動靜又如頌言種種隨心轉唯心非餘法心生種種生心滅種種滅眾生妄分別無物而見物無義唯是心無分別得脫何以得脫以知唯心故如第六獨生散意緣過去未來水月鏡像等變起假相分是此等相分但是眾生第六識妄構畫遍計當情變起都無心外實境是知入此觀門盡通萬法如箭射地無不中者若不入斯旨即隨他轉如箭射的多乖少中如有頌言行自境界中獲得所應得行他境界中如魚墮陸地若不觀心何識幻化以自心取自心非幻成幻法不取無非幻非幻常不生幻法從何立又云一切如幻其幻不實知幻是幻守真抱一既了物虗即歸於真心之一故又云善不善法從心化生一切境界意言分別制之一處諸緣斷滅故知六趣受身唯化所變三界有法皆揑所成莫不足躡乾城渴思𦦨水期空華結果望石女生兒若技女之出戲場空迷智眼如幻士之遊眾會但誑自心一向耽迷孰能觀察明知無別理但是妄心生為八倒之根株作四流之源穴疾如掣電猛若狂風撇起塵勞速甚瀑川之水欻生貪欲急過旋火之輪遂乃結構四魔驅馳十使沈二死之河底投八苦之𦦨中醉迷衣裏之珠徒經艱險鬪沒額中之寶空有悲號皆因妄心迷此真覺是知昇墜在我損益非他妄作妄修自當自受必無前境而作對治如昔有比丘夜悞踏瓜皮為是蝦蟇因此惡道受苦所以善從心起自福其身如珠現光還照珠體惡從心生反以自賊如䥫生垢銷毀其形所以君子尚反己而不怨天尤人況慕道參玄不信斯旨若不觀心何以行施以無可與者名為布施心外有法有可與者能所不亡不得三輪體空入施法界故若不觀心何以持戒以大乘大菩薩戒謂觀唯心本無外色無色可破相空亦無離取相過故名持戒又云一切凡聖戒盡心為體故云雖信別相不信一體無差別相名信不具故所有禁戒亦不具足所有多聞亦不具足故若不觀心何以忍辱故云忍者於一剎那盡一切相及諸所緣是知唯心無外境對持方名為忍故云辱境若龜毛方成真忍矣若不觀心何成精進故云若能心不起精進無有涯是知起心即有境所緣了心境俱空方成精進若不觀心何成禪定是以若不分別諸境是真調伏心了一切法空即常在三昧所以云大菩薩定謂觀唯識不見境時心無緣念則是真定如有頌言人生百歲情多放逸不如一日歸心空寂若不觀心何成般若以靈臺智性諸佛由生是嶮惡徑中之導師迷闇室中之明炬生死海中之智檝煩惱病中之良醫碎邪山之大風破魔軍之猛將照幽途之赫日警昏識之迅雷抉愚盲之金錍沃渴愛之甘露截癡網之惠刃給貧濟之寶珠若般若不明萬行虗設故云不識玄旨徒勞念淨又云不求諸法性相因緣是名正慧斯乃心性無生能成妙慧所以智慧者大菩薩皆觀自心意言分別以為境界從初發心乃至成佛皆作此觀以但唯識心分別都無前境究竟唯一真空更無所有故云空心不動具足六波羅蜜矣若不觀心何成方便菩薩以無所得為方便能入無邊幻網四攝攝生故心外無法何所得耶若不觀心何成大願願從心生故稱願海世界所持唯風輪萬行所興唯願海若不觀心何以成力故云質微則勢重質重則勢微如地質重故勢不如水水性重故力不如火火不如風風不如心心無形故力㝡無上神通變化八不思議心之力也此力能攝一切能成一切如魚母憶魚子蜂王攝蜜蜂魚母不憶魚子不生蜂王不攝羣蜂不聚一切國土想力所持諸緣境界隨念而至想空則境寂念滅則相亡如有偈言諸法不牢固唯在於立念以解見空者一切無想念若不觀心何以成智以心為智即是本性寂照之用此智凡聖皆具用有淺深故云終日圓覺而未甞圓覺者凡夫也欲證圓覺而未極圓覺者菩薩也住持圓覺而具足圓覺者如來也離圓覺無六道捨圓覺無三乘非圓覺無如來泯圓覺無真法其實皆一道也三世諸佛之所證盖證此也如來為大事出現盖為此事也三藏十二部一切修多羅盖詮此也斯乃窮原之說稱性之談如闡普眼之法門皆述理中之一義似剖大千之經卷非標心外之餘文攝網提綱一言無不略盡即權顯實殊說更無異盈於眾義中如從石選玉向羣經內猶披砂揀金耀不二之慧燈破情塵之暗惑注一味之智水洗意地之妄塵若能一句入神歷劫為種何以故此心法門於一切眾中為首為師為明為導故云一切法中心為上首又一切明中心明為上又佛以法為師故云此事唯我能知如鏡挂高臺似月懸廣漠孤光一照萬慮皆銷故云不仰太山靡覿千霄之狀不遊大海未覩沃日之奇不入此門焉知廣大若不觀心何以成多聞以但了心之一法根本自然遍攝羣經故云唯願少聞多解義趣即此意也是以種種諸法雖多但是一心所作於一聖道立無量名如一火因燃得草火木火之號猶一水就用得或羮或酒之名以圓明邊目之為珠以深廣邊稱之為海以神解之性號曰靈臺以萬法宗標名寶藏則攬草無非是藥執礫悉成金滿室唯聞詹匐之香空器遍盈甘露之味舉足不離金色界迴頭盡是旃檀林則四辯六通因茲而起三乘五性從此而惺所以如來常不說法名為具足多聞則眾生心中佛無示佛心中眾生無得可謂一心念念常轉法輪而無間斷若不觀心何以行慈以不入無緣不如礠石吸鐵任運吸取一切眾生故若不觀心何以運悲以不了同躰皆成愛見故云自男生我女徒生妄想悲若不觀心何生淨土故云三世一切諸佛皆無所有唯依自心菩薩若能了知諸佛及一切法皆唯心量得隨順忍或入初地捨身速生妙喜世界或生極樂淨佛土中又云智習唯識通如是取淨土是知昔人有言萬事萬形皆由心成心有高下故丘陵是生乃至云佛土常淨豈待變而後飾盖是變眾人之所見耳故云觀心性本淨猶如虗空即是性淨之境境即國也觀智覺悟此心名之為佛初觀名因觀成名果若論自行即是心王無染若論化他即是心數解脫智慧源但隨境界轉意如火事如法不制自意地唯從諸法流斯皆失本迷源隨流侚末若能頓明意地唯從諸法流直了心源不求脫於諸塵不繫縛於一法可謂究末遇本尋流得源矣遂乃無功而自辯無作而自成顯此一心萬法如鏡如是開示究竟指歸如八千聲聞於法華會中見如來性如秋收冬藏更無所作亦猶到寶所更無所至故云我法至久後要見說真實若說權小之法初機隨語執生且如毛道異生居不定聚若習性易染猶若白絲故云人性猶湍水決東則東決西則西又似尺蠖食黃而身黃食蒼而身蒼如第八含藏識中十法界種子一切俱有隨所聞熏之力發起現行若聞此觀心佛界種子自然開發又此是真性中緣起自在無礙法門一一皆談如理實德以法如是故非約變化對治權巧所說法法皆得全力非是分力如金鑄成十法界像一一像全得其金猶十子對父各各子全得其父但隨緣名字似有差別則真如法位本末皆同如有頌言諸色心現時如金銀隱起金處異名生與金無前後如金銀隱起功德之像龍鳳之形前後俱是金名字空差別如云法身流轉五道號曰眾生覺心不起名不動智佛前迷作眾生雖唯是識後悟而成佛亦不出心故云隨緣非有之法身亦不異事而顯現寂滅非無之眾生亦不異真而成立故頌云如來清淨藏世間阿賴耶如金與指鐶展轉無差別則知古今日月無異光明法爾山河常住世界因情有異隨智成差然分別本空而無異而無異情非理外差而無別可謂一道真心始終無變矣若不觀心何以護正法故云菩薩不須守護諸法若菩薩但能善護自心則能成就諸佛妙法又云但正其心不尚餘學自心若正萬境咸歸自心若邪諸塵有滯若金剛寶置日中而無定形猶玻瓈珠隨前塵而變眾色似天意樹逐天意轉比人間境逐人心成故云三界上下法我說唯是心則一切法是心心是一切法又如一水生四種見水無定相猶一金鑄五趣人金非別形任背覺合塵心元不動縱猒異捨別唯一真如是知十法界五陰三種世間一際無差唯心分別如有頌言無地及諸諦無國土及化佛辟支聲聞唯是心分別心遍一切處一切處皆心以心不善觀心性無諸相又云一切方海中依此於眾生心想而住如是信入懷抱澹然不以佛為欣不以魔為慼如幻師於幻無著知幻從我術生似調馬見影不驚如影從自身出故云無有少法能取小法無作用故但法生時緣起力大即一體上有二影生更互相望即不離諸心心所由緣起力其性法爾如是而生所以即境是心故難入即心是境故甚深如是則芥納須彌塵含法界壺日月毛孔山河自然明見故云不出圜堵之室而知天下者知反己之謂也所以云歸根得旨隨照失宗如諸佛唯一法身逐機感時自異心雜而但瞻青色意淳而唯覩金光若龍王布一味雨隨處而各見不同業淨則變作珠纓罪垢則觀成刀劒亦猶木母變色起自孝思金像舒光先於敬意似鏡鑒像形曲而影凹如谷答聲語雄而響厲故知昇降在我得喪由心飲甘露而蹈雲霞非他所授臥煙燄而吐膿血皆自所為劒樹刀山誰人淬鍊蓮臺寶樹何者興崇故云為善福隨履惡禍追響之應聲善惡如音非天龍鬼神所授非先禰所為造之者心成者身口矣又如偈言心為法本心尊心使中心念惡即言即行罪苦自追車轢于轍心為法本心尊心使中心念善即言即行福樂自追如影隨形如斯妙門直指心地如囊中有寶不探示之孰能知者猶室內金藏未遇智人何由發掘若珠蔽內衣裏弗偶親友呵責曷致富饒似窮子之家珍非長者之誘引爭能承紹如有頌言譬如暗中寶無燈不能見佛法無人說雖智不能了若不觀心何以受持讀誦以破塵出大千經卷仰空寫無量真詮念念轉法輪有何遺忘故云手不執卷常讀是經口無言音遍誦眾典佛不說法恒聞妙音心不思惟普照法界是以若遺文了義如師子就人若背義侚文猶癡犬逐塊故云我所說者義理非文汝所說者文語非義名字如塊真理如人無明癡犬逐名言塊種智師子得理亡名是以但侚其名言者只為不見自性發萌芽於境上起覺觀於心中水動珠昏雲飛月隱如有頌言瞎狗吠茆藂盲人唱賊虎循聲故致迷良猶目無覩故知須具己眼開發本心是以智人打牛不打車愚人磨甎不磨鏡磨甎焉能照物打車曷以進途打車如役苦身只練邪見無益之行磨甎似背圓教唯成但空下劣之乘覩為不薦靈臺真如法寶此是諸佛大威德不思議法門猶赫赫日輪豈外道嬰孩之所觀高高法座非少乘矬陋之能昇蚊蚋而難負須彌鷦鷯而焉吞㴾澥應須普賢長者子文殊大人方可直下承當頓圓無滯矣若不觀心何以弘法以一心為如來所說之根本盖緣如來依此一心而成就故是則教理行果皆依此心從微至著未甞離此若離於心得成佛者無有是處離此有說者皆外道教也是以云所言法者謂眾生心是心則攝一切世間出世間法依於此心顯示摩訶衍義如有頌言若一切唯心世間何處住去來依何法如何見地中如鳥虗空中依心風而去不住不觀察於地上而去如是諸眾生依分別風動自心中去來如空中飛鳥見身資生器佛說心如是故知若未識心不名弘法故云一切諸法悉出心中心即大乘心即佛性又心攝諸教觀一切眾生心中具足一切法門如來明審照其心法按彼心說無量教法從心而出雖名義無盡同詮一心故云華嚴等經中遮境唯識名為唯心辨中邊論遮邊執路名為中道般若經中明簡擇性名為般若法華經中明究竟運載名曰一乘勝鬘經中遮餘虗妄名一實諦顯法根本亦名一依由空而證又是空性亦名為空彰異出纏顯攝佛德佛從中出名如來藏明體不染真實法性名自性清淨心功德自體亦名法身無垢稱經遮理無差別名不二法門大惠經中表無起盡亦名不生不滅涅槃經中彰法身因多名佛性離縛解脫亦名涅槃楞伽經中表離言說名不思議瑜伽等中顯不可施設名非安立攝大乘等顯此遍常等名圓成實對法論等明非妄倒名曰真如是以萬法隨心而住讚之莫窮但契一心自含眾德故云至聖垂誥鏡一心之玄極大士弘闡燭微言之幽致雖忘懷於詮旨之域而浩行於文義之海盖欲寄象繫之迹窮無盡之趣矣是知非言無以立其文非文無以廣其義非義無以窮其玄夫得其玄者則一心無盡之宗矣故有頌云若欲三千大千界教化一切諸羣生如雲廣布無不及隨其根欲悉令喜毛端佛眾無有數眾生心樂亦無極悉應其心與法門一切法界皆如是若此弘法所利何窮直指自心全提家寶如傾囊倒藏大施無遮徹果該因更無前後可謂一念一時所益無際矣故云遮那之境界眾妙之玄門知識說之而不窮善財酌之而不竭文殊體之而寂寂普賢證之以重重是以若隨其法性如雲散長空本無一物若隨其智用如華開春谷佛事無遍雖說遍恒沙同遵一道矣故云如來於一言語中演說無邊契經海若不觀心何以建立道場以一念知一切法是道場成就一切智故又云一切眾生皆是道場是不動相故又道場者實相理遍為場萬行通證為道即道無不至場無不在若能懷道場於胸中遺萬累於身外者雖復形處憒閙跡與事隣乘動所遊無非道場也所以棄諸盖菩薩白佛言世尊曾聞如來而坐道場道在何處為近為遠而可見不佛言善男子法身遍滿無非佛土十方世界五蔭精舍性空自離即是道場云何問言為近遠耶善男子若能悟解道在身心如是之人則名為見諸法又云我坐道場時不得一法唯得顛倒煩惱所起畢竟空性以無所得故得以無所知故知若不觀心何明法相以有為無為一切諸法相皆從心出無不心也以心不守自性能隨染淨之緣成十法界之相故稱法相以正隨緣時不失自性故稱法性則隨緣無性無性隨緣如水不守自性隨風作波正作波時不失濕性若失濕性不能興波心性亦爾是知法性法相真俗義門並是如來藏性清淨真心之所建立若善若惡隨心所轉若順轉即名涅槃故云心造諸如來若逆轉即是生死故云三界虗妄皆一心作如水之體本無方圓入方器則方入圓器則圓故云諸佛非天非人而能天能人在天而天在人而人矣如有頌言譬如一心力能生種種心如是一佛身普現一切佛如是通達一際無差非古非今不增不減如有頌言如人掘路土私人以為像愚人謂像生智者言路土後時官欲行還將像填路像本非生滅路亦無新故所以生滅隨緣有異新故約時不同始末窮之唯一路土況前後聖迷悟不同初後觀之但一心識如是則見自心之高廣照無窮之聖應遂乃未解者令解未安者能安恩覆大千慈含法界故云若幽冥世界及於一一世界中間日月等光所不照處為作光明應學般若波羅蜜多斯之謂也若不觀心何以莊嚴以諸佛法身如真金相好似金莊嚴具以金作具體用全同從心現色性相無二如問云若佛法身無有種種差別色相云何能現種種諸色答以法身是色實體故能現種種色謂從本來色心無二以色本性即心自性說名智身以心本性即色自性說名法身依於法身一切如來所現色身遍一切處無有間斷又以無邊佛事皆從一心而起以從波羅蜜所生一切寶盖於一切佛境界清淨解所生一切華帳無生法忍所生一切衣入金剛法無礙心所生一切鈴網解一切法如幻心所生一切堅固香等故菩薩不待㽵嚴成就諸法以一心自具故是以觸境皆心盡成佛事故云雲臺寶網盡演妙音毛孔光明皆能說法香積世界飡香飯而三昧顯極樂佛國聽風柯而正念成絲竹可以傳心目擊以之存道既語默視瞬皆說則見聞覺知盡聽苟能得法契神何必要因言說如相者占人面色辯貴賤之形外道打髑髏之聲察善惡之事馬鳴有和羅之技帝釋有法樂之臣琴中傳意於秦王脫荊軻之手相如調文君之女終獲隨車是知若色若聲悉具一心法界故云一切色是佛色一切聲是佛聲矣若不觀心何以成菩提以菩提即是道道即是自性清淨心湛然不動盖是正覺無相之真智其道虗玄妙絕常境聽者無以容其聽智者無以運其知辨者無以措其言像者無以狀其儀故云菩提心者非有非造離於文字菩提即是心心即是眾生若能如是解是名菩薩修菩提心故所以證心成菩提故稱究竟無一念而不成遍照以一念頓圓故無一法而不被光明以念外無法故如云無有智外如為智所入亦無如外智能證於如又云無有少法與法同止是知唯心一際法門心外更無法可以對持可以同止所以云心不至境境不至心凡所見境唯所見心則實際理地諸佛不能行不能到大魔王亦不能行不能到以佛魔俱是實際一心若能行能到即成二法何者若有能行能到之人則有所行所到之法心外有法不成菩提今則逆順同歸美惡齊旨無非菩提矣如云五逆即菩提既五逆與菩提不出心性故所以天魔即法界即生死即涅槃門談實相而不壞假名論差別而不破平等眼不見有不淨之剎耳不聞有可惡之聲外道尼乾經皆是佛說提婆達多言語盡順正宗則荊棘垂七重行樹之陰梟獍說一道甚深之旨故云如瑠璃寶器隨所在處不失其性是知心亦如是垢法隨流而不增淨法返流而不減若以空明即空現若以色明即色現隨法界緣遍法界現現無現性緣緣自空唯一真心湛然不動如有頌言諸佛從心得解脫心者無垢名清淨五道鮮潔不受染有解此者成大道則五道由心雖遍丹臺無染恒清展六合而不弘縮一塵而非溢披毛戴角而本性不殊魄散形銷而一靈常在若不觀心何具道品以身受心法但一真心俱無自性了不可得即四念處觀善不善品法從心化生即四正勤心性虗通隱顯自在即四神足信心堅固湛若虗空即五根五力覺心不起即七覺支直了心性非邪非正即八正道心境融通自他一體即四攝法不得身口意常隨智慧行即十八不共法乃至萬行因圓十地果滿直至受記成佛皆不離一心故云心淨無垢則為受決又云不得一法諸佛疾與受記此一心門神性獨立未曾即一法未曾離一法未甞同一法未甞異一法何者以心外無法見法是心故稱無為之門絕待之妙如文殊履處盡為金海惠來時純是水所以云一切諸法一心量無心外法以無心外法故豈一心法與一心法作障礙事亦一心法與一心法作解脫事無有障礙無有解脫又云不見一切諸法是菩提相不證一法而證諸法是故說為應正遍知此六自在王恒常清淨要凡即凡要聖即聖大小不拘迷悟焉定羣生根由諸佛性命但隨緣生不與物競似指南車萬物同歸如解鷄犀四面皆正故云能知一切唯是一心名為心自在則無盡法財珍寶常出掌中十方一切虗空皆為智藏若不信自法而取前塵猶舉手摘遙星投身撈水月吹魚網而欲令氣滿取聲響而擬藏筐中豈有得時愚之甚矣如今取勝妙境猶美女愛鏡裏之容厭違逆境若惡馬自怖日中之影又取境之者如空中求空捨法之人若畏空狂走取捨而不離空內憎愛而俱在心中以不正觀成茲倒見如有頌云言詞所說法小智妄分別是故生障礙不了於自心不能了自心云何知正道彼由顛倒想增長一切惡又云第一義諦者但唯是心若不了心皆成世諦所以云以肉眼觀無真不俗以法眼觀無俗不真然若識心則肉眼是佛眼或不了心則天眼成翳眼如云大士肉眼圓通二乘天眼有翳且二乘以無漏智修得天眼云何却成障翳以藏通二教雖具六通不能一心即具法界皆以滅心為極果設使別教大乘能知一切法趣此心今未圓具須歷別修行次第生起俱存教道不入圓通以此觀門唯上根直受爾若不觀心何成佛事以萬法隨心迴轉善成一切能令凡聖交徹大小相含隱顯互成一多融攝故云觀心空王玄妙難測無形無相有大神力所以云此之供具皆是無作法所印無上心所成是以華藏山河皆成佛事善財知見悉入法門輪王坐妙寶床時入四禪而離五欲菩薩著法性冠處見一切法悉現在心或寂寞無言示心輪而顯妙或虗空絕相化闍王以悟真袈裟懸於高幢香飯取於上土或目擊而存道或異相而傳心放一毫智慧之心光示種種塵勞之佛事乃至如法華身內積大䥫圍之山川摩耶腹中展不可說之世界一塵中見難思之佛國針鋒上立無邊之身雲以四海之渺瀰攝歸毛孔用須彌之高廣內入芥中飛佛土於十方未移本處擲大千於界外含識莫知日月懸於毫端供具現於體內腹納劫燒之𦦨火事如然口吸十方之風身無損減斯皆自心轉變不動而遠近俄分一念包容無礙而大小相入或云香積去此有四十二恒河世界者即是經歷四十二位心地法門或云散華瓔珞空中成四柱之寶臺者即是常樂我淨一心四德之涅槃所以云此華盖等皆是無生法忍之所生起或佛言彼時鹿王者即我身是即結會古今明自心一際之法或教中凡有空中發聲告示言下息疑者並是頓悟自心非他境界如解脫和尚得遇化佛因請問深旨佛乃隱身不現空中說偈云方便智為燈照見心境界欲知真實法一切無所見因茲悟道又如楞伽王聞佛說法後佛與四眾忽然不見因此思惟頓入唯心之旨或法華移天人於他土即是三變心田或維摩取妙喜來此方斯乃即穢明淨或丈室容於高座寶蓋現於大千未離兜率已般涅槃不起樹王而昇忉利執手經無量之劫登閣見三世之因釋迦眉間出菩薩身雲之眾普賢毛孔示諸佛境界之門小器出無限之嘉羞仰空而雨難窮之珍寶不動此處遍坐道場十剎寶坊合為一土聞經於五十小劫猶若剎那之時現通七日之中舒之為一大劫如王質遇仙碁一局經三年而謂食頃周穆皇隨於幻士積多年歲實謂剎那尚能以短為長以長為短故知非干多時劫唯識所成耳乃至六相義十玄門皆是一心圓融顯現無礙六相義者一心為總相多心為別相乃至能同能異能成能壞皆是一心本末建立十玄門者同時具足相應門一多相容不同門乃至隱顯門帝網門具德門自在門安立門十世門託事門皆於此由心迴轉善成一門無量教義一時成就以平等心是一義差別心是多義以一心即一切心是相即義是同時相應義以一切心入一心是相入義以一心攝一切心是隱義以一切心資一心是顯義以不壞差別心而現平等心是多中一義以不隱平等心而現差別心是一中多義又微細心不礙廣大心廣大心不礙微細心是一多不同義以一實心是純差別心是雜差別心即一實心雜恒純一實心即差別心純恒雜即諸藏純雜義以一心帶一切心還入一心是帝網義因心現境識心是託事顯法義長劫短劫延促時量皆從積念而成一心所現是十世義因一心正義演難思法門究竟指歸言亡慮絕即唯心迴轉義自心既爾他心亦然涉入交羅重重無盡並是圓機入處悉堪投足栖神且如觀味聞香皆能悟道華飛釧動盡可證真語默嘗合玄微動止未離法界乃至恒沙義聚無量法門舉一例諸俱不出自心之法故知菩薩隨世所作皆表心故淨名經云不捨道法現凡夫事如云一念於一切處為一切眾生示成正覺是菩薩園林法身周遍盡虗空一切世界故則知不用天眼視徹見十方際曷假天眼耳聽遍聞法界聲寧仗神足通疾至十方土端坐寂不動諸佛常現前緊那羅琴豈假調品而韻似無聲之樂何須彈擊而成故云摩訶迦葉久滅意根圓明了知不因心念又云我有一語不過直與小於毫末大無方所本自圓成不勞機杼若不觀心何以懺悔以了一心真性解脫能空煩惱繫縛九結十使等若比餘法懺滌校其功力如㲲華千斤不如真金一兩似一栴檀樹改四千由旬伊蘭林能令煩惱即菩提故若不觀心何以滅罪以罪從心生還從心滅故云觀心無心從顛倒想起如此想心從妄想起如空中風無依止處如是法相不生不沒何者是罪何者是福我心自空罪福無主如是懺悔猶翻大地非除枝葉如云夫免三塗惡業者要須離有無二見證解一心方得解脫此乃是真阿蘭若處正修行門無別指歸究竟安隱故云自為洲渚自為歸處法為洲渚法為歸處無別洲渚無別歸處乃至除病止飢唯心所宰如吞虵得病豈有實境當情懸砂止飢皆是幻心想起或輸忠立孝亦心所成故云河嶽不靈唯人所感是以箭銜石虎奚功力之所致三軍告醉豈麴爇之所成魚躍水池非網羅之所捕笋抽寒谷匪陽和之所生皆是自心內感外現又如唐德宗朝驃國有使帝問何以知朕臨朝對云我國三年牛馬頭向東而臥水無巨浪海不揚波所以知中夏有華風乃陛下之聖德復有珠還合浦劒去吳都虎負子而過江鳳呈祥而入境且牛虎無計度分別珠劒本屬無情豈能感德知恩抱強負弱全是人心之所感真唯識義之所成如篤善則天座擁前習惡則火車盈側命富則玉堂金屋業貧則瓮牖席門但將心鏡照之萬事難迯影跡如有偈言亦不從天生亦不從地出但是空心性照世間如日更不見者是盲者咎故云雲駛月運舟行岸移不知妄想之雲自飛真月何動豈悟攀緣之舟常泛覺岸匪移若不觀心何以報恩故云將此深心奉塵剎此則名為報佛恩是以若報佛恩無先弘法裂邪見網竪正法幢若欲闡揚離心非正心若正萬法皆正心若邪萬法亦邪若離自心外欲破他邪此乃立自立他見邪見正如卸甲入陣弃火焚畬欲希破歒下種無有是處但能守護自心即是護持正法亦是普念十方如來亦名報恩亦名滿願亦是無非菩薩捨身命處亦是諸佛畢竟般涅槃處則一切寶王所有諸法一切至教攝化之門一切宗旨秘密之藏一切因果甚深之事此皆於此心無不圓足是以羣賢競起咸入此門萬法浩然宗一無相故云十方佛土中唯有一乘法則過去諸佛已說現在諸佛今說未來諸佛當說若能談斯妙法弘此圓宗以凡夫業報之身同佛所知用父母所生之眼齊如來見可謂下佛種子於眾生身田之中抽正法芽向煩惱欲泥之內然後七覺華發菩提果成展轉相生至無盡際有茲法利愍彼未聞故聲聞覩斯大事自鄙無堪或號泣而聲振大千或云同共一法中而不得此事若菩薩聞茲妙旨懺悔前非或云從無量劫來為我之所漂流或言我等未歸前悉是邪見人也是以偶斯正教恩地難酬任身座肉燈皮紙骨筆乃至常啼東請善財南求藥王燒手普明刎頭皆不能報一句之恩故云手足供給頭頂禮敬一切供養皆不能報唯持此心是名真報恩如有頌言假使造寶塔其數如恒沙不如剎那頃思惟於此經又弘餘法未足為難如云若立有頂為眾演說無量餘經亦未為難乃至足動大千界手把虗空行亦未為難能說是經是則為難故知竭海移山非無為之力任使躡虗履水皆有漏之通曷若開諸佛心演如來藏紹菩提種入一乘門能託聖胎成真佛子何以故謂得本故如從源出水因乳得酥鑿山求金而不鑿樹鑽乳求酥而不鑽水以樹無金水無酥故以決定知一切眾生皆有如來藏特令開悟返照絕疑無有不得之者入此觀門即見如來性菩提道果應念俱成如下水之船便風之火若隨他教不此正觀設福智齊修終不成就如求乳鑽水離山鑿金任歷三祇豈有得理若不觀心何以伐苦以心同法界眾生受苦之處即是菩薩心故云說苦受互起無有定體令知苦無生不妄受故是知說法名為伐苦以眾生不知故造罪業遺失真性奔驟外塵揑目而生三界之華迷頭而認六趣之影捨真慈父傭賃外方背己智王覊栖他國貧窮孤露歷劫無依聞此觀心頓成遭遇本來妙旨如拂霧瞻天無始塵勞猶擎湯沃雪遂乃裂魔罥趠欲泥摧慢山竭愛水貨衣珠而大富寧探驪頷之珠領家藏以長榮豈假連城之寶可謂即凡成聖點礫為金轉酥酪作醍醐變毒藥而成甘露遂使寒灰再𦦨必死重生萎草逢春枯田遇雨掘眾生之乾土涌諸佛之智泉抽聲聞之燋芽結一乘之圓果如此開示不負前機如解肘後之方似出囊中之寶若不觀心何以明三寶以心能大覺即是佛寶心能軌持即是法寶心能和合即是僧寶又云心王即是佛寶心數即僧寶所緣實際無王無數即法寶故若不觀心何以了四諦以心為苦實際名苦諦心性無和合名集諦心本寂滅名滅諦心本圓通名道諦若不觀心何以明三乘以觀心空出聲聞乘觀心假出菩薩乘觀心中出諸佛乘故知諸乘從心建立所以云若彼心滅盡無乘及乘者既無五乘之法亦無能乘之人以離人無有法離法無有人故若不觀心何以運神通以一心不動遍應十方無來去相即是神足通心含三世猶如眼見即宿命通以自心知他心即他心通不以二相見即天眼通聲處全聞即天耳通了境是心不起對執即漏盡通若不觀心何成解脫以一心門具足真解脫古佛慈勅諸佛解脫只令於眾生心行中求不於餘處求何者只謂眾生繫縛心是佛解脫心縛脫似異心性全同以因心成縛因心成解故如求火須木求水須氷以氷木是水火所出之源求無不獲如自心是羣生之本性諸佛之果源諸佛常同眾生自異若決定於心求之無不成現是知縛脫同原真俗無際如今古之日照無異明過現之風皷不二動似濫觴一滴與四海之濕性無差若芥孔之空等大虗之包含靡別若不觀心何明三藏以一切教藏皆從心生故云一切諸法畢竟寂滅心寂滅故云究竟毗尼即心出律藏一切善惡等法唯心所持經緯無盡即心出經藏觀心能研妙義即心出論藏若不觀心何以降四魔以一切障難皆是心魔故云若阿蘭若比丘當坐禪之時或有異境現前但念唯心境界無不速滅又云譬如兩木相揩則火自生還燒其木火不從風出不從水出不從地出其四魔者亦復如是皆從心生不從外來譬如畵師畵作形像隨手大小雖因緣合有彩有板有筆畵師不畵不能成像四魔如是心已堅固便無所起故知萬像雖備色等皆是無記法門焉能運為建立又此六塵是鈍不能自立不能自名一切能依無力須假所依心成今時學人若不直下頓明自心練行設滿三祇終不成辦何者以所治之過患無邊不能治之功德何盡又真俗境闊差別門深若一一依通分求分解似持螺酌海折草量天枉役思勞神罔窮邊際若能通達悉是自心則收法界於掌中指十方於眼際寶剎難思教海弗待尋而自知諸佛無盡身雲不動念而常見發行而便超極地成果而不隔初心此是諸佛所證之門菩薩所乘之道又云言大乘者謂是菩薩所行之路及佛勝果為得此故修唯識觀是無過失方便正路為此類故顯彼方便於諸經中種種行相而廣說如地水火風并持物品類難悉方處無邊由此審知自心相現遂於諸處捨其外相遠離欣慼復觀有海喧靜無差弃彼小途絕大乘望及於諸有耽著之類觀若險崖深生怖畏正趣中道若知但是自心所作無邊資粮易為積集不待多時如少用功能成大事善遊行處猶若掌中由斯理故所有願求當能圓滿隨意而轉又有頌云未了境唯心起種種分別達境唯心已分別則不生既了境唯心便捨外塵相從此息分別悟平等真空若不觀心何以殺六賊從一心起生三顛倒一心顛倒二見顛倒三想顛倒心如停賊主人見是賊身想如賊脚根塵是賊媒內外構連劫盡家寶見劫眼根善聲劫耳根善香劫鼻根善味劫舌根善觸劫身根善法劫意根善遂使法財傾竭智藏空虗如怨詐親誰有知者如或識賊賊不能為若了境識心終不為外塵所侵內結能縛若不入此唯心觀門未習學之者則情牽萬境意起百思投五欲旋火之輪未曾略暇陷五濁狴牢之處何省暫離塵網千重密密而常籠意地愛繩萬結條條而盡繫情田聳高阜於慢山橫遮法界涵長波於貪海吞盡欲流若蟻聚蜂攢攀緣擾擾如鼠偷狗竊結構營營八苦之𦦨長燒二死之河恒沒迷現量而失自心體逐比非而妄認外塵終日將心取心以幻緣幻似狗齩枯骨自嚥其津如象鼻取水還沐己體必無前境而作對治自從受身含識已來居三界塵勞之內猶熱病見鬼於非怨處認怨若翳眼生華向無愛中起愛妄出妄歿空是空非都不覺知莫能暫察今更不信復待何時然一切眾生雖具佛性若不開導似有如無應須勸發圓修普令成其法器故云譬如琵琶方響雖有妙音若無妙指則不能發是以樂蘊奇音指妙而宮商應節人懷覺性智巧而動用宜真故須速入此觀心門何往不從無求不利照之如鏡何法而不明歸之如海何以而不入千年闇室破之唯一燈無始塵勞照之唯一觀如云利之所在雖千仞之山無所不上深源之下無所不入商人通估倍道兼行夜以續日千里不遠利在前也漁人入海海水百仞衝波迸流宿夜不出利在水也此乃世間勤苦求利之志耳斯乃求世寶資業身增生死背菩提尚能殞命亡軀捍勞忍苦志求不退如或堅求至道曉夕忘疲不向外求虗襟澄慮密室靜坐端拱寧神利在心也如利之所在求無不獲況道在心信無不得矣此乃求覺寶養法身滅生死成菩提匪勞神不動念靡舉足焉用功自然冥契耳若不觀心何以辯染淨以真心不守自性隨惡緣而成染隨善緣而成淨當隨緣時不失自心本性又染淨相待真妄互熏隨緣似生俱無自體故云見垢實性即無淨相若不觀心何達二諦以心真如門即真諦心生滅門即俗諦此二諦俱能生一切法故又心成三諦者以有心也一切法有即是有諦心無也一切法無即是無諦有無不二即是中道第一義諦乃至一實諦無諦及百法八諦華嚴十諦皆是一心體用開合不同故若不觀心何以和光若凡聖各別不得名和心體離念不得眾生相法界即我我即法界名和故知若歸一心有何差別無一法而不順能成孝義之門無一念而不和盡為無諍之道遂得匡法國土無一境而不降靜佛邊疆絕一塵而作亂定父子於今日唯我家風會天性於此時更無異種可謂蘭出蘭葉檀出檀枝海湧千波千波即海矣如有頌言一身及無量燃火及霪雨心心體不異故說但是心心中但是心心無心而生種種色形相所見唯是心既達斯宗名為復本性雖本具道假人弘然後定慧更修等持互顯則智非禪無以發其照禪非智無以窮其幽斯乃泛覺海之迅航燭宗門之皎日昇第一義天之兩翼駕大白牛車之二輪散妄亂而似風吹雲破愚闇而日照世動邪見之深㓨拔無明之厚根為大覺海之陰陽作寶華王之父母俻一乘之基地堅萬行之垣墻是以今時自理未通仍乖習學似牛羊眼罔辯方隅同愚癡心不分菽麥智燈既闇定水全枯綆短而不勾深泉翅弱而不能遠翥唯堅我執成萬有之瘡疣偏起著心作四魔之根蒂境飃識𦦨燒盡善根業動心風吹殘白業著嗔魑魅之鬼趣墮癡羅剎之網中被貪愛王之拘留遭魔怨主之驅役誰能暫省傚此圓修歷千佛而不驚炷萬燈而莫曙嗟乎人身易失佛世難逢虗度時光空喪天日如有頌言盲龜浮木孔時時猶可值人一失命根億劫復難是海水深廣大三百三十六一針投海底求之尚可得設或有慕道又多是妄求唯恃意解情思並是隨言徇義俱不見性盡隨依通如携兔角之弓駕龜毛之箭以無手之者擬射碎須彌之山似傾壓沙之油點無煙之火貯漏巵之內欲照破䥫圍之陰徒役狂心無有是處如今但直了斯旨知解自銷反爾忘緣蕭然無寄如有頌言若人見般若論義心皆絕猶如日出時朝露一時失可謂施微功而獲大果興少學而齊上賢圓萬德於少成促三祇於一念似戰士受輪王之寶同長者得摩尼之珠應用無窮自他兼利若不觀心何以稱富故云大富無過知足何者以一心具足萬行更無心外法可求是以悟心得道之人懷抱曠然大忘天下如云金剛寶藏無有缺減是以身中表一相含無邊功德之門眉間放一毫照一萬八千世界此寶無價不遠當人求之無形用之無盡也所以云夫天地之內宇宙之間中有一寶秘在形山識物靈照內外空然寂寞難見其謂玄玄乃至其寶也奐奐煌煌朗照十方隱寂無無物圓堂堂應聲應色應陰應陽奇特無根妙用常存眴目不見側耳不聞若不觀心何以稱貴以道在即貴故綿密難見隱顯如神五目難覩其容二聽不聞其響迎之不見其前隨之弗得其後提實相印作物外之宗師入真如門紹法王之嫡子得法國土處萬有尊巍巍堂堂三界獨步列聖歸命無一事而不賓眾哲投成無一塵而不伏故云自從識得此明珠釋梵輪王俱不要若不觀心皆成疎外所以天下至親無過於心故偈云汝言與心親父母非可比汝行與道合諸佛心即是又云我與己為親智者善調心則得生善趣若心外有見則二法生二則成疎念念違背若得一則無諍得一則宜宗是以十方諸佛常正念無二之法故云一即是心心即是一無一別心無心別一一切諸法平等一味一相無相作一種光明心地之海如是則自他無對能所不生念念冥真心心合道如有頌言乃至有所立一切皆錯亂若見唯自心是則無違諍又如頌言身資生住持若如夢中生應有二種心而心無二相如刀不自割如指不自觸如心不自見其事亦如是若入此觀門內外皆成法眷屬眾生如佛如一如無二如理性相關故稱如來為世間之父一切眾生為諸佛子約自證法則禪定為父般若為母而生真淨法身若利他法則方便為父慈悲為母而生應化佛身故云菩薩以般若波羅蜜為母方便善巧為父檀波羅蜜為乳母尸羅波羅蜜為養母忍辱波羅蜜為莊嚴具精進波羅蜜為養育者禪波羅蜜為浣濯人善知識為教授師一切菩薩為伴侶一切善法為親屬一切菩薩為兄弟菩提心為家如理修行為家法諸地善法為家處得諸忍法為家族大願現前為家教以清淨智滿足諸行為順家法勸發勤修不斷大乘為紹家業法水灌頂一生所繫菩薩為王太子成就廣大真實菩提為淨家族此是自心出世法屬若心生世間親眷則無明為父貪愛為母六根為男六塵為女識為媒嫁出生無量煩惱子孫則以三界為家四趣為路我慢為墻壍妄執為門庭疑悔為親顛倒為侶邪見為導謬解為師駕六入之舟船入輪迴之障海住五蘊之窟宅九結之煩籠乃至用業為田癡為種子貪愛為水澆名色芽發起無量無邊生死之果故云有念即生死無念即泥洹矣故知八萬四千法門一切真俗之境皆從心所現心為所現法為能現心為主法為伴能所相攝主伴更資隱顯俱心卷舒唯識若不觀心皆成㒹倒以心外見法名為㒹理外別求名為倒凡夫常等四倒聲聞無常等四倒乃至九十六種外道等皆為不了自心盡成迷倒以心為境迷自作他豈非倒耶然既不取境亦不可滅以境自虗因心執有若著境若滅法二俱成倒如有頌言覺但是內心不滅於外法轉虗妄分別即是中道法唯心無可見離於心不生即是中道法我及諸佛說是以本師引十方諸佛出廣長舌相五眼所見一心所知示此於無量劫來求得此難信之法自覺聖智親證法門凡聖同倫一際平等以外道見隔眾生業遮菩薩執權二乘取證俱不明達盡昧圓常若逝多林中眇目聲聞罔覩華嚴之佛事似恒河岸上針喉餓鬼不見清淨之波瀾如大富盲兒處寶藏而不知不見猶業貧之士遇珠珍而變作毒蛇空負性靈甘絕分而猶爛豚自樂捨本逐末同𧏙蜋而逐塊虗行不偶斯文一生空過普勸後學莫擲光陰可以佩荷書紳可以驚嗟刻骨非施功力即凡心而見佛心不動塵勞當肉眼而開法眼如千秋之夢一覺頓惺似九五之尊凡庸直受今得聞此重重委曲真實之談若更不肯信入此總持觀心法門謂之大失故云若不觀心設勤苦修行即是天魔外道眷屬為彼之所驅馳方處三界牢獄設求出者必墮二乘三惡道坑自斷法身慧命誅滅菩提眷屬是破佛法國土大乘之家凡所施為皆無觀慧雖身出家而心不入道雖披染服未挂大乘之衣是含識界中從無始際來內為五蔭所縻外為六塵所梏觸途現境寓目生情如獼猴而五處俱黏類𧉑𬟼而諸塵盡泊所以見不超於色界聽不出於聲塵若投網之魚猶處籠之鳥進退俱阻如𦍞羊之觸藩驚懼齊臨似乳鷰之窠幕常居恐畏之世長受苦惱之身但了一心無相自顯六趣狴牢五欲籠檻自然超越出必由戶莫不因斯道矣故云六道羣蒙自此門出歷千劫而不返一何痛哉故知無明妄風皷心海而易動本覺真性夢長夜而難惺遍境提宗盈懷而弗悟觸途示道目擊而罔知似美玉投泥自埋高價如真金混礫枉匿光輝是以祖師特地西來諸佛驚入火宅令知塵是識了物即宗無始元因心迷今日還從心悟如因地而倒復從地而起身因方故迷還因方而悟道是知心非迷悟迷悟是心既達本心鑒同千日湛然寂照非從境生含虗任緣未嘗作意明明不昧了了常知舒之無蹤卷之無迹如澄潭瑩野明鏡懸空萬像森羅奐然明白不出不入無住無依斯則千聖冥歸萬靈交會佛佛授手祖祖相傳遂即發揚性起功德之門頓具真如相用似磨古鏡如瑩神珠光徹十方影透法界則一切眾生莫不承我恩力十方諸佛莫不賴我威光不為延促之所拘豈令大小之能轉便能隨緣應跡赴感侚機不動道場分身法界常在此而恒在彼不居方而不離方入此觀門自在如是會差別之迹徹平等之原如金剛山純現金光似師子王師子圍繞猶摩梨之山內盡出栴檀若諸天入雜林更無優劣比須彌南面靡現珠形如金沙大河無復迴曲況識一火是熱則天下火皆熱知蜜能甜例一切蜜盡甜如有頌言森羅及萬像一法之所印云何一法中而見有種種又云一即一切一切即一若能如是何慮不畢可謂頓入究竟無餘則能灰息遊心坐參知識言語道斷心行處滅矣若開菩提路妙旨難量截煩惱門殊功莫敵如金剛之斧力欲擬皆空等無翳之日光所臨俱朗等養由駕箭一一啼猿同香象渡河步步到底比好堅之樹出過羣林似頻伽鳥聲超餘音韻直下得力如師子就人一鎚便成猶王之寶器若海水蕩無不盡猶劫火燒無有餘將師子䈥為琴絃一奏而眾音斷絕以善見藥而治病纔服萬病咸銷如那羅箭之功勢穿䥫皷似金剛之力擬碎金山遇斯法門應須自慶此是精實之義絕妙之宗牽衣而縷縷俱來提綱而孔孔皆正照中為晨旭之照珠中為摩尼之珠華中為青蓮之華瑞中為優鉢之瑞可謂大中大圓中圓真中真妙中妙根本法輪之內更處其心生在金輪種中復為嫡子以少方便疾同菩薩似觀經尺鏡中現千里之影如窺牖隙之內見無際之空囊括智源一生參學事畢冠戴行海出世大事功終其由溺巨海而遇芳舟墜長空而乘靈鶴開藏取寶剖蚌得珠慧月入懷靈丹在握則萬邪莫迴其致千聖靡易其儀說此法門甚為希有如一手接四天下之雨藕絲懸須彌之峯蚊脚登山石筏渡海以難信故罕遇其機若了達之人如明識歸家道路當信入之者頓知正宗此觀心一門無邊妙義或得手擎頂戴口誦心思目矚耳聞意緣念想則熏于識染于神發其機繼其種不可輕慢自起障心如不信法華一乘是成佛門則身心狂亂不識涅槃三寶是常住法則唇口乾燋以不識不信故捨背內心馳求外境如遺真金拾礫弃大海存漚執魚目為珠掬水泡作寶是以背心求道者譬如癡賊弃捨金寶擔負瓦礫此之謂也既不識真寶便成謗心則解背圓詮謬說般若罔知乳之正色唯談鵠雪不辯象之真體空述秤箕似入雜之金同添水之乳全埋意地不出蔭城今時學人例皆如此是知實相之教真訓之言於無量國中尚不聞名字設或遭遇深計曩緣若不聞說自心焉知如是奇特始悟不鏡方寸辜負平生如云帝網未張千瓔焉覿宏綱忽舉萬目自開且如范獻賤萬畝之田以貴舟人片說楚莊輕千乘之國而重申叔一言古人求法尚立雪幽庭聞教則輸金若市乃剜身打髓入火投巖盡為求聞於未聞悟於未悟一句超於百億一言證於菩提此非少緣須生兢慎矣故云知色心空得佛何難又云須臾聞之即得究竟菩提故若能如是悟解則境智俱閑然後畢故而不造新隨緣而常合道無依如水月不繫若虗舟以虗空為心匪嶮𡾟於時俗用法界為量寧隕㦜於世途意無所緣不馳驅於境界心無所寄豈適莫於寰區遂得逆順竝行怨親普救善惡同化利鈍咸收理事齊觀權實雙用乘戒兼急正助相資修性互成體用周俻如萬善同歸頌云菩提無發而發佛道無求故成妙用無行而行真智無作而作興悲悟其同體行慈深入無緣無所捨而行檀無所持而具戒修進了無所起習忍達無所傷般若悟境無生禪定知心無住鑒無身而具相證無說而談詮建立水月道場莊嚴性空世界羅列幻化供具供養影響如來懺悔罪性本空勸請法身常住迴向了無所得隨喜福等真如讚歎彼我虗玄發願能使平等禮拜影現法會行道步躡真空焚香妙達無生誦經深通實相散華顯諸無著彈指以表去塵施為谷響度門修習空華萬行深入緣生性海常遊如幻法門誓斷無染塵勞願生唯心淨土履踐實際理地出入無得觀門降伏鏡像魔軍大作夢中佛事廣度如化含識同證寂滅菩提治曆五年正月二十三日酉時書寫了
