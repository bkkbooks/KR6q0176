  - {type: variant, offset: 0, length: 1966, content: '宗鏡錄中略出大意夫若不入觀心法門，會萬物為自己者，則一理不立，一事不成。何以故？理因心顯，事假心成。若無於心，決定無有一法而可建立。故云：「從無住本立一切法。」以萬法本無自體，但從識變。心若不起，諸境皆空，心生法生，心滅法滅，此之謂矣。無量光院若不觀心，何以得道？故云：「心即是道。」道則是心。又云：「道非心外，行在言前。」即心為道者，可謂尋流得源矣。若不觀心，何以成佛？以即心是佛，即佛是心。心外無別佛，佛外無別心。又云：「諸佛與一切眾生唯是一心，更無別法。」覺心即是，唯此一心即是佛，見此心即是見佛。是以「如來成正覺時，於其身中普見一切眾生成正覺，乃至普見一切眾生入涅槃。皆同一性，所謂無性。」以無性故，隨淨緣而成佛，隨染緣而墮凡。然雖處凡身，覺性不動。如真金像弊服所覆，猶無價寶垢衣所纏，若貧女而懷聖胎，同青蓮而未出水。時節有異，心性無差。如瓶貯醍醐，隨諸器而不等；猶水分江海，遂流處而得名。此是上上根人，一念法界，直聞直受，頓入頓修。若中下之根，見多訛謬，空領唯心之旨，微細義理不通。或執心為空，或執心為有；或知心名而不識心體，或了心理而不具心行。真妄莫辨，本末焉明。所以五性不同，三乘有別。宗分南北，見其親疏，況末代淺根，寧無疏漏耶。如圭峰揀云:如北宗明眾生本有覺性，如鏡有明性，妄念淨則心性覺悟，昏塵盡則鏡體光明。評曰：此但是染淨緣起之相，反流背習之門，而不覺妄念本無，心性本淨，悟既未徹，修豈稱真？其洪州云：起心動念，彈指動目，所作所為，皆是佛性全體之用，更無別用。如世人一念命終，全身都未變壞，即便口不能言，眼不能見，耳不能聞，足不能行，手不能作，故知能言語動作者，必是佛性。評曰：北宗則分別動作，一切是妄；洪州則分別動作，一切是真。若存他則失己，爭肯會同？牛頭云：諸法如夢，本來無事，心境本寂，非今始悟。理宜喪己忘情，方絕苦因妄果。評曰：此以忘情為修，洪州以念念全真為悟，任心為修。此以本無事為悟，忘情為修。如上三家見解異者，初一皆妄，次一皆真，後一皆無。若就行說者，初伏心滅妄，次信任情性，後休心不起。今荷澤宗者，是釋迦降世，達磨西來之意也。將前望此，此乃迴異於前。將此攝前，前則全同於此。謂諸法如夢，諸聖同說故。妄念本寂，塵境本空，空寂之心，靈知不昧，即此空寂之知，是前達磨所傳清淨心也。任迷任悟，心本自知。不藉緣生，不因境起。迷時煩惱，知非煩惱；悟時神變，知非神變。然知之一字，眾妙之門。此知是一切含生心體，心是名，知是體。如水是名，濕是體。此知非能所分別之知，亦非智照證悟之知，乃是真性自然靈知，任運了然，亦非作意。隨緣不變，不變隨緣。故云空寂知，空寂即是無相，以神解之性，雖無形相，而靈知不昧。故云寂知，亦云寂照，亦云無相之知，亦云無知之知。如肇論云：放光云：「般若無所有相，無生滅相。」道行云：「般若無所知。無所見。」此辨智照之用。而曰無相無知者何耶？果有無相之知，不知之照明矣？何者？夫有所知，則有所不知。以聖心無知，故無所不知。不知之知，乃曰一切知。故經云：「聖心無知，無所不知。」信矣。空寂即是無相，即是無知。論云：「無所不知。」又云：「乃曰一切知者。」此知即是真知，同空寂之知。亦云：「無念之知。」若有念而知，凡夫境界；若無念無知，二乘境界；若無念而知，諸佛境界。空寂即是無念，亦云無住之知。有所住，如人入闇，即無所見。無所住，如日月光明，照見種種色。特以喻顯：如一摩尼珠一靈心也，唯圓明淨空寂知也，都無一切差別色相此知本無一切分別，亦無一切善惡也。以體明故，對外物時，能現一切差別相以體知故，對諸緣時，能分別一切是非好惡，乃至經營造作世間種種事數，此是隨緣義也。色相自有差別，明珠不曾變易愚智善惡自有差別，憂喜愛憎自有起滅，能知之心不曾間斷，此是不變易義也。然珠所現色，雖有百千般，今且取與明珠相違之黑色以況，靈明知見與黑闇無明，雖相違，而是一體法喻已具。謂如珠現黑色時，徹體全黑，都不見明靈知之心，在凡夫時，全是愚癡貪愛，都不覺知，如無如來知見大圓鏡智。故經：身心等相皆是無明也。若癡孩子或村墅云見之，直是黑珠迷人但見定是凡夫。上都喻六道眾生，已下諸宗教之人。有人語云：「此是明珠。」灼然不信，卻嗔前人，謂言欺誑。任說種種道理，終不聽覽或向道：「汝今了了能知，現是佛心。」直不照察，但言某乙鈍根，實不能入。此是大小乘法相及人天教中，著根之人，意所見如此也。縱有肯信所言說是明珠者，緣覩其黑，亦謂被黑色纏裹覆障，擬待磨拭揩洗，方去黑闇或普清潔也。得明相出現，始名親見明珠北宗見解如此也。復有一類人，指示云：「即此黑闇便是明珠。」明珠之體永不可見。欲得識者，即黑便是，乃至即種種青黃皆是，致令愚者的信此言，專記黑相，或認種種相，以為明珠。或於異時見黑槵子、未吹、青珠、碧珠，乃至赤琥珀、白石瑛等珠，皆云是摩尼珠。或於異時，見摩尼珠都不對色時，但有明淨之相，卻不認之，以不見有諸色可識認故，疑恐局一明相故洪州見解如此也，愚者彼宗後覺也。異時乃至黑槵子等者，心涉世間分別塵境時，見貪、愛、嗔、慢之念也。琥珀白石瑛者，如慈、善、謙、敬之念也。不對色時者，無所念也。但有明淨者，了了自知無念也。疑局者云：唯認知是偏局也。復有一類人，聞此種種色皆是虛妄，徹體全空，即計此一顆珠都是其空，便云都不執定，方是達人，認有一法，便是未了。不悟色相皆空之處，乃是不空明瑩之珠。牛頭見解如此也，聞說空者，諸部般若說空經也。計此一顆珠等者，計本覺性，亦空無所有。認有等者，聞說諸法空寂之處，了了能知，是本覺真心，體不空。不空者，涅槃經云：如瓶空者，謂瓶中無物，名為瓶空，非謂無瓶。即明真心之中，無分別貪嗔等念，名為心空，非為無心者，但謂遣卻心中煩惱也。故知，牛頭但遣其非，未顯其是。從此已下喻澤意也。黃繹勳提供日本天理大學版本', 卍續: ''}
