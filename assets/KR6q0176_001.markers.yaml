  - {type: variant, offset: 1966, length: 2078, content: 何如直云唯瑩淨圓明，方是珠體？唯空寂知也，若但說空寂，而不顯知，即何異虛空。亦如圓顆瑩之瓷團，雖淨，無明性。何名摩尼？何能現顯？洪州牛頭但說無一切，不顯靈知，亦如此也。其色乃至一切青黃色等，悉是虛妄善惡分別，舉動為如，洪州所說，起心動念等也，用心動念皆妄。故金剛經云：「凡所有相，皆是虛妄。」當知彼宗認虛妄為真性也。正見黑時，黑元不黑，但是其明。青元不青，但是其明。乃至赤白黃等，一一但見瑩淨圓明，即於珠不惑。一切皆空，唯心不變。迷時亦知，知元不迷。念起亦知，知元無念。乃至哀樂喜怒愛惡，一一皆知。知元空寂，空寂無知，即於心性了然不惑。此上皆迴異諸宗也，故初標云：將前望此，此即迴異於前也。但於珠不惑，則黑既無黑，黑即是珠，諸色皆爾。即是有無自在，明黑融通，復何礙哉？此同彼二宗，黑即無黑，牛頭洪州俱云：「一切皆無也，黑即是珠。」已下同洪州云：「一切皆是佛性，凡聖善惡皆無所礙。」故初標云：將此攝前，即全同於此。已下喻意。再將荷澤本宗，揀三宗也。若不認得明珠是能現之體，永無變易又明荷澤認得也，但云黑等是珠洪州，或擬離黑覓珠北宗，或言明黑都無者牛頭，皆是未見珠也都法。問：「據大乘經及古今諸宗禪門，乃至荷澤，所說理性皆同。云無善無惡，無果無因，無凡無聖，無是無非，無住無為，不可證不可說。今何獨標荷澤為正？」答：「荷澤於空無相處，指示知見，了了常知，不昧心性。是故諸教，只說此知，無住無生等，令人認得，便覺自心。經生越世，永無間斷，乃至成佛也。」荷澤又束無為無住，乃至不可說等種種之言，但云空寂知，一切攝盡。空卻諸相，猶是遮遣之言。唯寂是實性不變動義，不同空無也。知是當體表顯義，不同分別也，唯此方為真心本體。故始自發心，乃至成佛。唯寂唯知，不變不斷，但隨地位，名義稍殊。謂約了悟時，名為理智理即是寂，智即知也。約發心修時，名為止觀。止息麤緣，契於寂也。觀照性相，冥於知也。約任運成行，名定惠。因止緣而心定，定者寂然不變。因觀照而發惠，惠者知無分別矣。約煩惱都盡，功行圓滿，成佛之時，名為菩提涅槃。菩提梵語，此云覺，即是知也。涅槃梵語，此云寂滅，即是寂也。當知始自發心，乃至畢竟，唯寂唯知。若知二宗但言空寂無為等義，而闕菩提等義。問：「洪州亦云靈覺及鑒照等，何異於知？」答：「今指示即愚智善惡，乃至禽畜等心性，皆自然了了常知，異於木石。其覺智等言，即不通一切為。迷者不覺，愚者無智。心無記時，即不名鑒等，豈同心體自然常知？故花嚴疏主，《答順宗所問心要》云：『無住心體，靈知不昧。』又云：『任運寂知。』又云：『雙照寂知。』花嚴經亦揀知與智別。況洪州雖云靈覺，但是標眾生有之。如云皆有佛性之言，非的指示，指示則但能語言等。若細詰之，即云一切假名，無有定法。且統論佛教，有遣顯二門，推其實義，有真空妙有，究其本心，具體具用。今洪州牛頭，以拂跡為至極，但得遣教之意。真空之義，唯成其體。失於顯教之意，妙有之義，闕其用也。」問：「洪州以能語言動作等，顯於心性，即當顯教，即是其用。何所闕耶？」答：「真心本體有二種用，一者自性本用，二隨緣應用。猶如銅鏡，銅之質是自性體，銅之明是自性用。明所現影，是隨緣用，影即對緣方現。現有千差，明即光明，明唯一味。以喻心常寂是自性體，心常知是自性用，此能語言能分別動作等，是隨緣用，今洪州指示能語言動作等，但是隨緣用也，闕自性用也。」又顯教有比量顯，現量顯。洪州云：「心不可指示，但以能言語等驗之，知有佛性。」是比量顯也。荷澤直云：「心體能知，知即是心，不約知以顯心。」是現量也。如諸祖所說，心之一字，言不頓彰義，分別前後。若約一言之內，皆攝無邊。以無漏性德，真如萬行，一心本具故。所以云：「提綱則網正。舉領則衣齊。」自是聞者乖宗，多隨語轉，聞有執有，聞空滯空，見解偏枯，致茲差誤。迷佛方便執指循文，都不知證下之旨。若頓機一覽，豁悟無疑，凡聞一言，便知說心，更無異法。豈存四句，寧墮百非。乃至聞說有為，則知舉有為心宗便攝法界，聞說無為，亦是舉無為心端，亦具法界。或說真諦俗諦，凡掛言詮，盡圓照之一心，理事具足。此皆多是後學誤領錯傳，故非宗師之咎矣。且如洪州所宗直論真性，不辨邪正異同，此則唯逗上上之機。一聞千悟，頓圓大覺，不涉漸修，種現俱消，正習咸斷。如經云：「見若諦，習亦除。」於理則絲毫不差，約行則無復上慢。如圭峰所揀，頗令精微，俯為羣機，恐成叼濫，洞明體用，分析異同於後學進修，甚為利益。理事無滯，祖教並行，妙旨豁然，可為龜鏡。若不觀心，何以成凡聖？以凡聖但名，於一心實際中，無毫釐凡聖可得。故云：「心淨故眾生淨，心垢故眾生垢。」心能天堂，心能地獄。如有頌云：「一切眾生界，皆在三世中，三世諸眾生，悉住五薀中。諸薀業為本，諸業心為本，心法猶如幻，世間亦如是。」若不觀心，何以出家？故云：「觀一念心，淨若虛空，不為二邊桎梏所礙，平等大惠，無住無著，即名出家。」又有偈言：「無瞋是持戒，心淨是出家，我性與汝合，一切法無差。」若不觀心，何成正報？以因心造業成身，故古頌云：「天龍阿修羅，地獄鬼羅剎，心常為導主，如王行三界。心將詣天上，復行於人中；心將至餓道，心輪轉世間。」若不觀心，何成依報？以只於自心性相，分身土二名。以自心相義名身，以自心性義名土。故知主伴依正，不離五薀。五薀性空，即是一心平等。又云：「見法從緣，則知國由心現。由心現故，有而即空。空為法源，萬法由生。見法性源，是真智惠。」又有頌言：「心住於世間，世間住於心，於此不妄起，二非二分別。」既全是心，誰言一二？但有言說，皆是識心，計度分別。如有頌言：「諸法寂滅非寂滅，遠離此二分別心，知諸分別是世見，入於正位分別盡。」若不觀心，何以窮源？故云：「窮源莫二，執跡多端。若據本以討源，則千途無異轍，若三江之浩渺，並出於岷山也。」又云：此觀心法為大根人，善識法要，不由次第，懸照諸法之源，所謂眾生心也。一切諸法，由心而起，若能反觀心性，不得心源，即知萬法皆無根本。如是則可比知，我心為諸法本。聖教正理，證若恒沙。如有頌言：「天地風空虛，波池方大海，皆真內所作，外義俱非有。」又云：「聖教及正理，各別有功能，而生於信惠，無一不成故。」若無此一心觀門，無由信惠，離唯識理，無成佛期。如千人排門，不如一人拔開。黃繹勳提供日本天理大學版本, 卍續: ''}
