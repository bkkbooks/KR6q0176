  - {type: variant, offset: 8068, length: 1592, content: 若不觀心，何窮理事？以性空之理，相虛之事，互成互奪，隱顯同時，皆是一心開合之旨。合唯一性，開作萬像。緣性無妨，體用自在，以一心真如之法，法爾隨緣，隨緣之法，法爾歸性。若不觀心，何以成信？以菩薩十信之初創發心時，即觀本識自性，緣起因果之體，得成正信。故云：「信心不二，不二信心。言語道斷，非去來今。」是知：諸法所生，唯心所現，即是顯識第八本心。如云：一切三界，但唯有識者。一是顯識，二分別識。顯識者即是本識，轉作五塵四大等。分別識即是意識，於顯識中分別，作人天長短，大小男女，一切萬物等。乃至譬如依鏡色，影色得起顯。如是緣顯識，分別識得起。顯識如鏡，分別識如鏡中像，像依鏡現，如意識緣本識起。又云：由此轉識，能迴轉造作無量諸法。或轉作根，或轉作塵，或轉作我，或轉作識，如此種種不同，唯識所作。如此造作迴轉也，或於自於他，互相隨逐者，於自則轉為五陰，或為色陰，乃至識陰。於他則轉為怨親中人，種種不同，望自五陰，故稱為他，如是自他互相轉作，前後不同。故云：互相隨逐也。種種所作，並皆是識，無別境界。起種種分別等者，一一識中，皆具能所，能分別即是識，所分別即是境。能即依他性，所即分別性。故云：「起種種分別，及所分別也。」由如此義，離識之外，更無別境，但唯有識。是知：諸器世間，山河大地，身根種子，皆是第八阿賴耶識之相分，於中分別高下、長短、好醜、精粗，悉是意識計度。故知：無有一法，非心所標。可謂現證法門，能杜羣疑矣。若不觀心，何能稱悟？以心包法界，知一即一切故。即之於心，了之無際矣。以昔迷時，皆是遍計分別所執之性，邪思妄見，情有理無，但執似生，無毫釐實。空中垂髮，火上旋輪，燄水乾城，浮雲奔電，乃至機中見鬼，繩上生蛇，諸境有無，亦復如是。如有頌言：「內外一切物，所見唯自心，有情心二性，能取及所取。心體有二門，即心見眾物，凡夫性迷惑，於自不能了。」故知：「三界唯心，萬法唯識。」識相識性，皆不離心。心所心王但是識，是以心識二名，本唯一體，若性若相，若能若所，若內若外，若自若他，本末融通，悉皆是識。如墜地獄，惡業熟時，銅狗鐵山，共相逼害，業謝即空；如油盡燈滅。或似處夢，見善惡之事，雖無實境，而有作用；或見毒蛇，雖不被螫，然有疑毒，能令悶絕，流行心迷。又如求梵天咒術，夢中親聞天授，天實不來，以天為增上緣，自心感見，復曾聞乎？夫求子息，夢見有人，共為交集，便得其子。又如有人思他國婬女，彼實不來，夢中從事。或於夢中，被人趨逐，奔走驚嚇。或得寶拜官，喜慶交集，雖無實事，欣感宛然。俱唯是心，與覺無異。只如二乘，但信夢中唯識，不信覺時唯心。且如外見佛形，皆是轉識所現。如釋迦文佛，化五百力士之時，舉石空界，吹散為塵，後還合成，復擎掌中，令彼力士，伏我慢心。故佛有言：「我實不舉其石，安置虛空，亦不吹散，皆是我積劫熏修，慈善根力，令彼自心，見如是事。」可現證斯旨，一切例然。又如金地、酪酥河、肉山、魚、米皆不離菩薩能變之心，更無外境。故云：諸佛菩薩變地為金者，以妙觀察智，繫大圓鏡智，及異熟識，令地種不起，金種生現。以此為增上，能令眾生，地滅金生，名之為變，非為便轉地成金。又如福德之人，捉石為金；業貪之人，遇金為石。金非石而石現，石非金而金生。轉變皆心，金石無體。又似神通之者，地作水相，水作地形，悉隨意成，無有虛妄。故云：一切物中，皆有可轉之理。如僧護見身為寂瓶等。當知：色法皆隨感現，色無定體，隨心所變。此理元是如來藏中不思議法，隨心取著，成外成內，汝等所行，是菩薩道。平等法界，方寸無虧，則一切無礙人，一道出生死。十方薄伽梵，一路涅槃門。本自一心，隨機見異，如不識驪珠，認為魚目，魚目空有其名，珠體宛然不易。然此唯心法，是最上乘，四緣四分，道理而成。三量三宗，詮棟而立。故非耶謬，大旨皎然，眾聖羣賢，無邊誓願之同稟，千經萬論，恒沙正義之俱詮。若不觀心，何以成頓？以心如寶印，文字頓現，更無前後際故。約斷障說，如斬一婁絲，萬條頓斷。若修德說，如染一婁絲，萬修頓色。故云一念與性相應，八萬波羅蜜行，一時齊用。如有頌言：「如是知心識，明解一切法，一切知見人，速成等正覺。」若不觀心，何以破疑辨惑？故云：求大乘者，所疑有二，夫大乘法體為一？為多？如其是一，即無異法，無異法故，無諸眾生，菩薩為誰發弘誓願？若是世多法，即非一體，非一體故，物我各別，何得起同體大悲？由是疑惑，不能發心。今為譴此二疑立一心法，開真如生滅，體用二種門。立一心法者，遣彼物疑，明大乘法，唯有一心，一心之外，更無別法。但有無明，迷自一心，起諸波浪，流轉六道。雖起六道之浪，不出一心之海，良由一心，動作六道故。得發弘誓之願，六道不出一心，故能起同體大悲。如是依於一心，能遣二疑，得發大心，具足佛道。此說一心，破出世菩薩疑惑也。黃繹勳提供日本天理大學版本, 卍續: ''}
