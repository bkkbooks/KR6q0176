  - {type: variant, offset: 4044, length: 2029, content: 餘教如排門，見有善惡之境，妄修功行。種種對治，如剝色蕉，謂有真實；猶食蒗蕩，妄見針火。都不知凡聖之境，從本以來皆是意言分別。此意言有二，一似名，一似義。名義攝，一切法皆盡此名義，但是意言分別所作，離此無別餘法。故知：「自他內外事相，唯是一心轉變。」若佛唯識，但有真心。故云：「唯有真如及真如智獨存，說名法身。」可謂理事之宗，凡聖之地矣。如是信入，況一人拔關，無不應時開悟。若不觀心，何以得體？以凡聖諸法，皆自心為體。故云：「知一切法，即心自性，成就惠身，不由他悟。」以此心體，橫遍豎周，從體起用，用無差別。如布青陽，令處處春色；皆同似折白檀香，片片如本香無異。若不觀心，何以達本？以一切諸法，皆以第八阿賴耶識心為本，則本立而道生，根成而果熟。如無綱，目不立；無皮，毛靡附。又此根本識心，遍在諸法。如沫在浪，若油遍麻，似鹹處鹽，猶青住色，光潛日月，香薀沈檀，泥在於瓶。無常遍境，心無間斷，亦復如是。故有頌云：如地無分別，庶物依以生。藏識亦復然，眾境之依處。如人以己手，還自捫其身；亦如象以鼻，取水自霑灑。復似諸嬰孩，以口含其指；如是識分別，現境還自緣。是心之境界，普遍於三有。久修觀行者，而能善通達，內外諸世間，一切唯心現。若不觀心，何以成觀？故云：「一心三觀，三觀一心。」理事圓融，開合自在，若心空十法界空，心假十法界假，心中十法界中。唯心識觀云：所謂於一切時一切處，隨身口意，所有作業，悉當觀察。知唯是心，乃至一切境界。若心住念，皆當察知，勿令使心無記，攀緣不自覺知。於念念間，悉應觀察，隨心所有緣念，當使心隨逐彼念，令心自知，知己內心，自生想念，非一切境界，有念有分別也。所謂內心自生長短、好惡、是非、得失、衰利、有無等見，無量諸想。而一切境界，未曾有想，起於分別。當知一切境界，自無分別想，故即自非長非短，非好非惡，乃至非有非無，離一切相。如是觀察，一切諸法，唯心想生。若使離心，則無一法一相，而能自見有差別也。或花嚴四觀，普賢十觀，乃至絕觀，皆不離心，而得成就。若不觀心，何以辨名？以一切法，本自無名，無名而有名者，皆從心起，心即名也。其能如是解者，即於正觀心中，見一切諸佛菩薩，乃至無邊教義，無不知也。若不觀心，何以明教？以因心立教，因教明心。一切言說義宗，教理行果，悉皆是心，無不收盡。以一切言語，由覺觀心；一切諸行，由於思心；一切義理，由惠心故。即觀一念因緣，所生之心生滅，即起藏教。故云：「佛告諸比丘，謂一切者，只是一法。何等為法？心是一法。」離心無一切法也。觀心因緣所生之法空，即起通教。觀心因緣所生即假名，具足一切恒沙佛法，依無明阿賴耶識，分別無量聖諦，即起別教。觀心因緣所生，具足一切十法界法，無所積聚，不縱不橫，不思議中道二諦之理，即起圓教。故云：「一色一香，無非中道。」乃至五味半滿，無盡真詮，悉從一心而演，從真如出，依法界流。故云：「破一微塵，讀大千經卷。」若不觀心，何以成用？以凡有施為，皆是一心真如之妙用。故云：「繁興大用，起必全真。」如截金杖，寸寸是寶；猶體諸法，一一皆心。若不觀心，何以提宗？以萬法一心為宗，宗者尊也。故云：「天上天下唯我獨尊。」則一法為宗，萬象皆爾。如一葉落，天下秋；一塵起，大地收；又如一花開，天下春；一事實，萬法真。所以舉一例，諸無煩廣覽。故云：說教本窮無相理，廣讀元來不識心。識取心，了取【CB】，〔－〕【卍續】（CBETA 按：本段文句乃永明延壽引用「高城和尚歌」的內容。黃繹勳提供日本天理大學所收藏《觀心玄樞》寫本之錄文作「了境」，永明延壽《宗鏡錄》（T48n2016_p0511c18）及《禪門諸祖師偈頌》（X66n1298_p0731a01）等典籍均作「了取境」。今依他校及「高城和尚歌」句式規律增補「取」字。）取T48n2016_p0511c18T48n2016_p0945a25境，識心了境禪河靜。若能了境便識心，萬法都如達婆影。又如頌言：「如飯一粒熟，餘粒即可知，諸法亦復然，知一即知彼。」譬如攢酪者，嘗之以指端，如是諸法性，可以觀察，所以蔟義天星象，指在一塵；卷教海之波瀾，歸乎一滴。若不觀心，何以立行？以行從心成，理能導行。故有頌云：「若不證真如，焉能了諸行？猶如幻事等，似有而非真。」如解脫長者，告善財言：我若欲見安樂世界阿彌陀佛，隨意即見。乃至所見十方諸佛，皆由自心。善男子，當知菩薩修諸佛法，淨諸佛剎，積習妙行，調伏眾生，發大誓願，入一切智，自在遊戲，不可思議解脫之門。得佛菩提，現大神通，遍住十方一切法界，以微細智，普入諸劫，如是一切悉由自心。是故，善男子，應以善心，扶助自心；應以法水，潤澤自心；應於境界，淨治自心；應以精進，堅固自心；應以忍辱，坦蕩自心；應以智證，潔白自心；應以智慧，明利自心；應以佛自在，開發自心；應以佛平等，擴大自心；佛十力，照察自心。是以心該萬法，謂非但一念觀佛，由於自心，菩薩萬行，佛果體用，亦不離心。乃至佛之三身，十波羅密，菩薩利他等行，並依自法，融轉而行。即眾生心中，有真如體大，今日修行，引出法身。由心中有真如相大，今日修行，引出報身。由心中有真如用大，今日修行，引出化身。由心中有真如法性，自在無慳貪，今日修學，順法性無慳，引出檀波羅密等。當知三祉修行道，不曾心外得一法、行一法。何以故？但是自心，引出自淨行性，而起修之。故知，摩尼沈泥，不能雨寶，古鏡積垢，焉能鑒人？雖心性圓明，本來具足，若不眾善顯發，萬行磨治，方便引出，成其妙用，則永翳客塵，長淪識海，成妄生死，障淨菩提。若不觀心，何以入位？以心心圓融，位位即佛。故云：「一地具足一切諸地功德。」以一心圓融不礙，隨事行布。如一圓珠有八萬四千孔，隨入一孔，全收珠體。故云：「八萬四千法門，門門解脫。」何以俱成解脫？但唯自心，無別法繫縛故。如魚在水，若鳥翔空，出水則鱗枯，離空則翼墜，人不識心亦如是。若不觀心，何以知因果？以大乘因者，即是實相；大乘果者，亦是實相。一切無有不由心者，萬象森羅，皆是善惡報應，業之影像，自心所招，增上等流之果。故云：「若入此觀法，則智與心相應。」是以，因由心學，果是心成；境由心現，解由心起。分位神通，是心力用。造作是心現起，分別是心決擇，所得是心，乃至尋求知識，造諸佛土皆是心。故云：「三界無別法，但是一心作。」是以心垢，則娑婆現相；心淨，則花藏含空。迴轉而恒起識輪，交羅而匪離心納。故海幢不起寂定，應作十方佛事之門。善財不出道場，遍歷一百十城之法。乃至號阿閦佛者，此云不動，以一心於諸境界中不動故。處凡身而不滅，居聖體而不增。登一相而不昇，淪五道而不墜，故云不動。黃繹勳提供日本天理大學版本, 卍續: ''}
