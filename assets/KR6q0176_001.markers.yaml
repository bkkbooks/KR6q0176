  - {type: variant, offset: 6073, length: 1995, content: 稱阿彌佛者，此云無量壽。以一心真如，妙理性無盡，故稱無量。達大道心，虛通無礙，名為菩薩。了心所生，因緣性離，即名緣覺。從心所聞，以佛道聲，令一切聞，即號聲聞。十心數法即十大弟子，文殊即妙惠根本之心，普賢即圓行無盡之心，觀音即大悲之心，勢至即大智之心。但有真俗二諦，世出世間，一切凡聖名字，皆是心作，離心更無一法。如離海無水，離空無雲。則一切善惡境界，皆是心光。一切聖妙受用，皆是心果。故云：其為也形，其寂也冥，本淨非瑩，法爾天成。光超日月，德越太清，萬物無作，一切無名。轉變天地，自在縱橫，恒沙而用，混沌而成。誰聞不喜？誰聞不驚？如何以無價之寶，隱於蔭入之坑。方知自心殊勝如是，仰為千聖，讚之靡窮，遍覽羣經，釋之莫盡。若契同心性，何德不收？以一切諸法，隨所依住，皆於一心，頓圓滿故。故云：「若有人信汝所說，則為見我，亦見於汝及比丘僧，并諸菩薩。」何者？聞經心信無疑，覺此信心明淨，即是見釋迦佛。若心所中，惠數分明，是見身子。諸餘心數分明，是見諸比丘僧，慈悲心淨，是見諸菩薩。即心便是，亦無所見。是以善財童子，頓了無能所處，便成佛故。又如頌云：「所取不可取，所見不可見，所聞不可聞，一心不思議。」若不觀心，何以照明佛性？夫佛性者，即如來藏，是真識心。此心中具有一切恒沙佛法，如妄心中具有恒沙染法，是心與法同一體性，故名如來藏。即一切眾生有如來藏，能為佛因，名為佛性。如睡心中有覺悟性，如黃石中有金性，白石中有銀性。如是一切世間法中，皆有涅槃性，此性即是眾生自覺，故名為我，我即佛性。夫佛性者，義有多門。若約智則名本覺性，智性自了故，以平等性智了本性故。或名大圓鏡智，普照無遺故。若約定是說，或名不思議定，情智絕待故。亦名真如三昧，萬行根本故。亦名一行三昧，一念法界故。亦名金剛三昧，常不傾動故。亦名法性三昧，恒無變易故。諸佛智光明海，無量觀行，皆從此生。若不體此理，非佛智。故以此佛智，證斯本理，理則不待照而自了，智則必資理而自了，智則必資理而成。故智理無興廢，寂照靈知，弘之在人，覺有先後，人有照分，功由理發，失理則失照，要見此理方成佛耳。此理即是一心，物該萬有，頓悟頓修，更無漸次。為未了不入之者，於一心法，分出多門，義演恒沙，乃至無盡。如有頌言：「小智樂小法，不自信作佛，是故以方便，分別說諸果。」雖然未了，性且無鍔，時機契會，自然開發。如貧女室中金藏，雖未掘而覺寶匪移；若力士額上明珠，任鬥沒而光明常在；猶雪山筩中藥味，暫流出而正體恒存；如大地底下金剛，縱穿斷而堅慳不壞。又夫佛性體有三因：一應得因，二加行因，三圓滿因。又應得因中具有三性：一住自性性，二引出性，三得果性。以住自性之理，在凡而即具。以引出性之事，成果而不虛。以應得之文，處染而何失？以至得之道，證聖而無疑。故云：「眾生身中，有金剛佛性，猶如日輪。」佛者是覺，人有靈知之覺。今第一義空，與之為性，故名佛性。非情無覺，但持自體，得稱為法。今真性以之為性，故名法性。故云：「假說能所，而實無差，同一性故。」外典亦云：「天地萬物，同稟陰陽之元氣也。」既稱同稟，豈有別緣。故知：有情無情，有性無性，皆同一道，所為唯心，或號真如，或稱靈智，或云妙性，或說真心，或號真知者。不同虛空，性自神解，此是本體常知，不假作意。所以云：此心有真實了知義。稱靈知者，此是靈覺之性。故云：此心有大智慧光明義。云妙性者，是不假義，無變異義。故云：不變隨緣，名之為心；隨緣不變，名之為性。說真心者，即是真實自性清淨心。故云：此心有遍照法界義。是以本師，最後究竟垂示，唯說一切眾生，皆有佛性。如應盡還源品云：爾時世尊如是逆順入諸禪已，普告大眾，我以甚深般若，遍觀三界一切六道，諸山大海大地含生。如是三界根本性離，畢竟寂滅，同虛空相。無名無識，永斷諸有，本來平等，無高下相。無見無聞，無覺無知，不可繫縛，不可解脫。無眾生，無壽命，不生不起，不盡不滅，非世間非非世間。涅槃生死皆不可得，二際平等等諸法故。閒居靜住，無所施為，究竟安置，必不可得。從無住法，法性施為，斷一切相，一無所有。法相如是，其知是者，名出世人。是事不知，名生死始。又復告大眾：我以摩訶般若，遍觀三界有情無情，一切人法，悉皆究竟。無繫縛者，無解脫者，無主無依，不可攝持，不出三界，不入諸有，本來清淨，無垢無煩，性虛空。等不可等，非不平等。盡諸動念，思想心息，如是法相，名大涅槃。真見此法，名為解脫。凡夫不知，名曰無明。又復告大眾：我以佛眼，遍觀三界一切諸法，無明本際，性本解脫，於十方求，了不能得，根本無故。所因枝葉，悉皆解脫，無明解脫故，乃至老死皆得解脫。以是因緣，我今安住常寂滅光，名大涅槃。又云：一切障礙，即究竟覺。得念失念，無非解脫，成法破法，皆名涅槃。智惠愚痴，通為般若。菩薩外道，所成就法，同是菩提。無明真如，無異境界。諸戒定惠，及婬怒痴，俱是梵行。眾生國土，同一法性。地獄天宮，皆為淨土。有性無性，齊成佛道。一切煩惱，畢竟解脫。法界海惠，照了諸相，猶如虛空，此名如來隨猶覺性。善男子，但願諸菩薩及末世眾生，居一切時，不起妄念。於諸妄心不息滅，住妄想境，不加了知。於無了知，不辨真實。彼諸眾生，聞是法門，信解受持，不生驚畏，是即名為隨順猶覺性。是知：了心即境，達境唯心，則處處無生，塵塵隨覺性矣。若不觀心，何了緣起？以無心外法，能與心為緣。但是自心生，還與心為相，乃至四緣十二因緣，六因五果等。一切差別義海，百法明門，悉是心成，更無果法。如云：「一切法門無盡海，同會一法道場中。」若水疊千波不離溼；以金分萬器，皆是一金。若不觀心，何辨性相？菩薩觀一切法，皆以心為自性，如是而住。相有二種：一影像相，山河大地，皆是心之影像；二所執相，諸相無體，隨執而生。相又二種，一如外顯現，二如內顯現。如外是相，如內是思維。內即是心體，外即是心用，任展恒沙，用周法界，皆不離於心也，性以處內，相以表外，內外雖分，一心不動，則心非內外，內外是心。黃繹勳提供日本天理大學版本, 卍續: ''}
