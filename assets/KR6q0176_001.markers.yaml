  - {type: variant, offset: 9660, length: 1521, content: 破世間凡夫疑惑者，只謂一切眾生，不了自心為境，惑亂於不見處見，向不聞處聞。如餓鬼同見膿河，翳眼妄觀蠅髮，醉人看轉日，熱病現珠形，定中覩香花，夢裏乘船筏，罪人怖銅狗，病士飲盃蛇。斯皆是自心，識變所作，不能明了，妄起愛憎。如西施愛江，嫫母嫌鏡，豈知妍醜在我，何關物乎。又如云：似一美色，婬人見之，以為淨妙，心生染著。不淨觀人，觀之種種惡露，無一淨處。等婦見之，妒瞋憎惡，目不欲見，以為不淨。婬人觀之為樂，妒人觀之為苦。淨行之人，觀之得道。無預之人，觀之無所適莫，如見土木。若此美色實淨，四種人觀，皆應見淨，若實不淨，四種人觀，皆應不淨。以是故知好醜在心，外無定也。又如凡夫食是轉王毒，人間淨是諸天穢；如共食寶器，任福而飯色不同；似一無為隨證，而三乘有別。故知境本非善，但以順己之情，便名為善；境本非惡，但以違己之情，便名為惡。是知：實無外境，唯想變情生。以此證知斯門不謬，是諸佛最上之妙理，第一之真詮。猶如地，發生萬物；猶如海，容受百川；猶如鏡，一道照臨；猶如秤，審量一切。故有頌言：「此即是佛最勝之教理，審量一切法，如秤，如明鏡，照耀如明燈，亦如試金石，正道之標相，遠離於斷滅。」可斷纖疑，同正斯理。如未入者，應須靜慮，虛襟澄神，寂照如同眼見，豈言說之能及乎？若動念起思，返失真鑒。故云：「如人動目，天地傾搖。」故不能如實知也。但如密室之燈，自然朗耀，此之心法唯證。乃知神妙無方，至理玄邈，三際求而內得，二諦推而莫知。無像無名，不可以測其深廣。無依無住，不可察其指蹤。細入無間之中，不可言其小；大包乾象之外，不可以語其深。至道虛玄，孰能合有？幽靈不墜，孰能合無？邊分法界而非多，性合真空而非一，體凝一道而非靜，用周萬物而匪勞。如如意珠，天上勝寶，狀如芥栗，有大功能，淨明五欲。七寶琳瑯，非內畜，非外入，不謀前後，不擇多少，不作麤妙。稱意豐儉，降雨滾滾不添，不盡利益無窮。蓋是色法，尚是如此，豈況心神妙，寧不具一切法耶。此第一義諦，觀心法門，非淺智承當，劣根信入，鷰雀焉攀鴻鵠之志，井之蛙寧探滄海之淵？如金翅鳥飛翼奚及。若毗沙門寶，貧室難儔。比師子哮乳時，貍弗能作。似香象所肩擔，驢不能勝。須遇大機，一聞千悟，同驛馬見鞭影，速入正途。如日出照高山，頓明心地。如有頌云：「便是猶倍句，動目即差違，若問曹谿旨，不更待揚眉。」若不觀心，何以出生死？是以凡夫貪著，無常計常，念念輪迴，新新生滅。雖年百歲，猶若剎那。如東逝之長波，似西垂之殘照，擊石之星火，驟隙之迅駒，風裏之微燈，草頭之懸露，歸崖之朽樹，爍目之電光。若不遇斯觀門，則萬劫虛浪生死。是以生死無際，如旋火輪，一息一眴之中，有四百生死。煙迴電轉，命若懸絲。如羊就屠，似肉趣市。當祿命盡處，風火散時，勢不可臨，威不可遏。如師子正飢困，毒蛇吸大風，惡鬼振瞋心，渴馬護惜水。死王奮力，甚畏於彼。若欲了絕，不無其門，但先斷業繩，次開心訣。如云：「心外有法，生死輪迴；無心外法，生死永棄。」是知了心實相，眾患俱銷，如伐樹除根，生死之苦永絕。猶灸病得穴，煩惱之流病不生。又若毗藍之風，卷羣疑而淨盡；猶劫燒之火，蕩異執而無餘。若以漸教漸修，執事戒定，不入斯門，但除枝葉。故云：「身被戒鎧，心無惠劍者，則不能懷結使之元首。」若不觀心，妙惠成就，終不能斷無明根本。如日光現而絕暗冥，業跡盡而無惡境。是以若不在現量，焉知法空？空惠若成，當處解脫，則異生不墮生死海，迷處全空，諸佛不證真如門，悟時無得。若不觀心，何以證涅槃？以諸行皆以大涅槃心為本。故云：「安置諸子於祕密藏中，我亦自入其中。」又云：「此大般涅槃，是諸佛放捨身命之處。」則自他始終，究竟指歸之處。千聖同稟，百民交歸。方知：凡亦是心，聖亦是心。如清亦是水，濁亦是水。以所習處下，不能自弘，則溺塵勞耳。若以心託事，則狹劣為相，所局不能自在。故若以事從心，則廣大，以心無住無依，則能放曠。故大凡世人，多外熏其事，而內不曉其心，是以所作所為，俱非究竟，所以附處卑故耳。如檮縛牛之虻，飛極百步。若附鸞尾，則一翥萬里，非其翼工，所託迅也。亦牆頭之草，角裏之聲，皆能致其高遠者，所託之勝也。如入此觀門，一一附於自心，則毛吞巨浸，塵納十方，豈非深廣乎？故如來出世，為此一心大事因緣，開示悟入，一切眾生心，即是佛心，契同無二。如藏中無寶，徒勞掘鑿。只有不寶，不廢人工。但發信心，必當見性。故云：「我為汝保任此事，終不虛也。」纔入斯門，一際平等。如水未入海則不鹹，薪未入火則不燒，境未歸心則不等。若以此觀之，萬事皆同一照。黃繹勳提供日本天理大學版本, 卍續: ''}
